<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>EcommPilot — Contexto do seu negócio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --canvas: #EEF0F4; --card: #FFFFFF; --card-muted: #F6F7F9;
  --line: #E7EAEF; --line-strong: #D5D9E0;
  --ink: #0E1116; --ink-2: #3A4150; --ink-3: #6B7280; --ink-4: #9AA1AC; --ink-5: #C4C9D1;
  --violet: #6D5BFF; --violet-soft: #EFEBFF; --indigo: #4458F5;
  --pink: #FF6B9B; --pink-soft: #FFE7EE; --teal: #14B8A6; --teal-soft: #DCFAF4;
  --amber: #F59E0B; --amber-soft: #FEF3C7; --rose: #F43F5E; --rose-soft: #FFE4E6;
  --sky: #38BDF8; --sky-soft: #E0F2FE; --slate: #64748B; --slate-soft: #EDF0F4;
  --primary: #0E1116; --primary-ink: #FFFFFF;
  --radius-xl: 22px; --radius-lg: 18px; --radius: 14px; --radius-sm: 10px;
  --shadow-card: 0 1px 0 rgba(15,17,22,0.02), 0 1px 3px rgba(15,17,22,0.04), 0 12px 28px -16px rgba(15,17,22,0.10);
  --shadow-pop: 0 1px 0 rgba(15,17,22,0.02), 0 24px 48px -18px rgba(15,17,22,0.18);
}
[data-theme="dark"] {
  --canvas: #0B0D11; --card: #14171D; --card-muted: #1A1E26;
  --line: #232831; --line-strong: #2E343F;
  --ink: #F1F3F7; --ink-2: #C7CDD7; --ink-3: #8B92A0; --ink-4: #5F6776; --ink-5: #3F4654;
  --violet: #8B7BFF; --violet-soft: #221C45; --pink: #FF7DA8; --pink-soft: #3D1B2C;
  --teal: #2DD4BF; --teal-soft: #103833; --amber: #FBBF24; --amber-soft: #3A2B0C;
  --rose: #FB7185; --rose-soft: #3A1820; --sky: #5DC9FB; --sky-soft: #0E2A3D;
  --slate: #94A3B8; --slate-soft: #1E2530; --primary: #FFFFFF; --primary-ink: #0E1116;
  --shadow-card: 0 1px 0 rgba(255,255,255,0.02), 0 12px 28px -16px rgba(0,0,0,0.6);
  --shadow-pop: 0 24px 48px -18px rgba(0,0,0,0.7);
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; min-height: 100vh;
  background:
    radial-gradient(1100px 620px at 12% -8%, color-mix(in srgb, var(--violet) 14%, transparent), transparent 60%),
    radial-gradient(900px 560px at 108% 112%, color-mix(in srgb, var(--pink) 12%, transparent), transparent 60%),
    var(--canvas);
  color: var(--ink);
  font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui, -apple-system, sans-serif;
  font-size: 14px; line-height: 1.45;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "tnum"; }
.wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
.shell { width: 100%; max-width: 760px; }

/* Top brand + progress */
.ob-top { display: flex; align-items: center; gap: 11px; margin-bottom: 24px; }
.brand-mark {
  width: 34px; height: 34px; border-radius: 11px;
  background: linear-gradient(135deg, var(--violet) 0%, var(--pink) 100%);
  display: grid; place-items: center; color: white; font-weight: 800; font-size: 15px; letter-spacing: -0.02em;
  box-shadow: 0 6px 16px -5px rgba(109, 91, 255, 0.55);
}
.brand-name { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
.brand-name sup { font-size: 9px; font-weight: 600; color: var(--ink-3); margin-left: 2px; vertical-align: super; }
.ob-steps { margin-left: auto; display: flex; align-items: center; gap: 7px; }
.ob-steps i { width: 7px; height: 7px; border-radius: 50%; background: var(--line-strong); transition: all .25s; }
.ob-steps i.on { background: var(--violet); width: 22px; border-radius: 999px; }
.ob-steps i.done { background: var(--violet); }

/* Card */
.ob-card {
  background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-xl);
  box-shadow: var(--shadow-pop); padding: 34px 38px 28px; position: relative; overflow: hidden;
}

/* Step header (client identity on step 1) */
.ctx-head { display: flex; align-items: center; gap: 15px; margin-bottom: 22px; }
.ctx-avatar {
  width: 52px; height: 52px; border-radius: 15px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--teal), var(--sky)); color: #fff;
  display: grid; place-items: center; font-size: 19px; font-weight: 800; letter-spacing: -0.02em;
  box-shadow: 0 10px 24px -12px var(--teal);
}
.ctx-head .ctx-store { font-size: 12.5px; color: var(--ink-3); font-weight: 600; }
.ctx-head .ctx-store b { color: var(--ink); font-weight: 700; }

.ob-eyebrow { font-size: 11.5px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--violet); }
.ob-h { font-size: 25px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.14; margin: 10px 0 8px; text-wrap: balance; }
.ob-sub { font-size: 14.5px; color: var(--ink-3); line-height: 1.55; max-width: 56ch; text-wrap: pretty; }

/* Question block */
.q { margin-top: 26px; }
.q-label { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px; }
.q-num { width: 19px; height: 19px; border-radius: 6px; background: var(--ink); color: var(--card); font-size: 10.5px; font-weight: 700; display: grid; place-items: center; flex-shrink: 0; }
.q-hint { font-size: 12.5px; color: var(--ink-4); font-weight: 500; margin: 4px 0 0 27px; }
.q-body { margin-top: 13px; }

/* Card-grid options (single select, rich) */
.opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
.opt {
  text-align: left; appearance: none; cursor: pointer; font-family: inherit;
  background: var(--card); border: 1.5px solid var(--line); border-radius: var(--radius); 
  padding: 14px 15px; transition: all .15s; position: relative; display: flex; gap: 12px; align-items: flex-start;
}
.opt:hover { border-color: var(--line-strong); }
.opt.sel { border-color: var(--violet); background: var(--violet-soft); }
.opt-ic { width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center; background: var(--card-muted); color: var(--ink-2); flex-shrink: 0; transition: all .15s; }
.opt.sel .opt-ic { background: var(--violet); color: #fff; }
.opt-tt { min-width: 0; }
.opt-name { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; display: block; }
.opt-desc { font-size: 12px; color: var(--ink-3); margin-top: 3px; line-height: 1.4; text-wrap: pretty; display: block; }

/* Chips (multi-select) */
.chips { display: flex; flex-wrap: wrap; gap: 9px; }
.chip {
  appearance: none; cursor: pointer; font-family: inherit;
  background: var(--card); border: 1.5px solid var(--line); border-radius: 999px;
  padding: 9px 15px; font-size: 13px; font-weight: 600; color: var(--ink-2);
  display: inline-flex; align-items: center; gap: 7px; transition: all .14s;
}
.chip:hover { border-color: var(--line-strong); }
.chip.sel { border-color: var(--violet); background: var(--violet-soft); color: var(--violet); }
.chip .ck { width: 15px; height: 15px; border-radius: 50%; background: var(--violet); color: #fff; display: none; place-items: center; }
.chip.sel .ck { display: grid; }

/* Pill segmented (faixas + plataforma) */
.seg { display: flex; flex-wrap: wrap; gap: 8px; }
.seg button {
  appearance: none; cursor: pointer; font-family: inherit; flex: 1; min-width: 92px;
  background: var(--card); border: 1.5px solid var(--line); border-radius: var(--radius-sm);
  padding: 11px 10px; font-size: 13px; font-weight: 600; color: var(--ink-2); transition: all .14s; text-align: center;
}
.seg button:hover { border-color: var(--line-strong); }
.seg button.sel { border-color: var(--violet); background: var(--violet-soft); color: var(--violet); }
.seg .pre { display: block; font-size: 10px; font-weight: 700; color: var(--ink-4); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px; }

/* Risk scale (4-pt) */
.risk { }
.risk-track { display: flex; gap: 7px; }
.risk-track button {
  appearance: none; cursor: pointer; font-family: inherit; flex: 1;
  border: 1.5px solid var(--line); background: var(--card); border-radius: var(--radius-sm);
  padding: 13px 8px 11px; transition: all .15s; position: relative;
}
.risk-track button:hover { border-color: var(--line-strong); }
.risk-track button.sel { border-color: var(--violet); background: var(--violet-soft); }
.risk-bars { display: flex; gap: 3px; justify-content: center; margin-bottom: 7px; height: 18px; align-items: flex-end; }
.risk-bars i { width: 5px; border-radius: 2px; background: var(--ink-5); }
.risk-track button.sel .risk-bars i.on { background: var(--violet); }
.risk-bars i.on { background: var(--ink-3); }
.risk-name { font-size: 12px; font-weight: 700; color: var(--ink-2); text-align: center; }
.risk-track button.sel .risk-name { color: var(--violet); }
.risk-ends { display: flex; justify-content: space-between; margin-top: 9px; font-size: 11.5px; color: var(--ink-4); font-weight: 600; }

/* Date rows (for selected calendar events) */
.cal-rows { margin-top: 13px; display: flex; flex-direction: column; gap: 9px; }
.cal-row { display: flex; align-items: center; gap: 10px; background: var(--card-muted); border: 1px solid var(--line); border-radius: var(--radius); padding: 10px 12px; }
.cal-evt { font-size: 13px; font-weight: 700; color: var(--ink); flex-shrink: 0; min-width: 96px; display: flex; align-items: center; gap: 7px; }
.cal-evt .vd { width: 7px; height: 7px; border-radius: 50%; background: var(--violet); }
.cal-name-input { flex: 1; min-width: 80px; }
.cal-dates { display: flex; align-items: center; gap: 7px; margin-left: auto; }
.cal-dates span { font-size: 11.5px; color: var(--ink-4); }
input[type="date"], .cal-name-input input, .note-area {
  font-family: inherit; font-size: 13px; color: var(--ink);
  background: var(--card); border: 1px solid var(--line-strong); border-radius: 9px; padding: 8px 11px;
}
input[type="date"] { color-scheme: light; }
[data-theme="dark"] input[type="date"] { color-scheme: dark; }
.cal-name-input input { width: 100%; }
input:focus, .note-area:focus { outline: 2px solid var(--violet-soft); border-color: var(--violet); }

/* Free note */
.note-area { width: 100%; min-height: 92px; resize: vertical; line-height: 1.5; }
.note-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 9px; gap: 12px; }
.note-warn { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--amber); font-weight: 600; background: var(--amber-soft); padding: 7px 11px; border-radius: 9px; line-height: 1.35; }
[data-theme="dark"] .note-warn { color: var(--amber); }
.note-count { font-size: 11.5px; color: var(--ink-4); flex-shrink: 0; }
.note-count.over { color: var(--rose); font-weight: 700; }

/* Privacy strip */
.priv { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--ink-4); margin-top: 18px; line-height: 1.45; }
.priv svg { color: var(--teal); flex-shrink: 0; }

/* Footer nav */
.ob-foot { display: flex; align-items: center; gap: 10px; margin-top: 28px; padding-top: 22px; border-top: 1px solid var(--line); }
.btn-next {
  appearance: none; border: 0; cursor: pointer; font-family: inherit; margin-left: auto;
  background: var(--primary); color: var(--primary-ink); font-size: 14px; font-weight: 700;
  padding: 13px 22px; border-radius: 999px; display: inline-flex; align-items: center; gap: 8px; transition: filter .15s, opacity .15s;
}
.btn-next:hover { filter: brightness(1.08); }
.btn-next:disabled { opacity: .4; cursor: default; filter: none; }
.btn-back {
  appearance: none; border: 1px solid var(--line); background: var(--card); color: var(--ink-2); cursor: pointer; font-family: inherit;
  font-size: 13.5px; font-weight: 600; padding: 12px 18px; border-radius: 999px; display: inline-flex; align-items: center; gap: 7px;
}
.btn-back:hover { border-color: var(--line-strong); }
.step-count { font-size: 12.5px; color: var(--ink-4); font-weight: 600; }

.fade { animation: fade .3s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
@media (prefers-reduced-motion: reduce) { .fade { animation: none; } }

@media (max-width: 640px) {
  .ob-card { padding: 24px 20px 22px; }
  .opt-grid { grid-template-columns: 1fr; }
  .ob-h { font-size: 22px; }
  .cal-row { flex-wrap: wrap; }
  .cal-dates { margin-left: 0; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useMemo } = React;
const NOTE_MAX = 280;

const Ico = ({ children, size = 22, sw = 1.8, ...p }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
       strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" {...p}>{children}</svg>
);
const Icons = {
  Rocket: (p) => <Ico {...p}><path d="M5 16c-1.5 1.3-2 5-2 5s3.7-.5 5-2c.7-.8.7-2 0-2.8a2 2 0 0 0-3 0z" /><path d="M9 12a14 14 0 0 1 7-9c2.5 0 5 2.5 5 5a14 14 0 0 1-9 7" /><path d="M9 12l3 3" /><circle cx="15" cy="9" r="1.4" /></Ico>,
  Shield: (p) => <Ico {...p}><path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6l8-3z" /><path d="m9 12 2 2 4-4" /></Ico>,
  Scissors: (p) => <Ico {...p}><circle cx="6" cy="6" r="3" /><circle cx="6" cy="18" r="3" /><path d="M20 4 8.1 15.9M14.5 14.5 20 20M8.1 8.1 12 12" /></Ico>,
  Launch: (p) => <Ico {...p}><path d="M12 3v6M9 6l3-3 3 3" /><rect x="4" y="9" width="16" height="12" rx="2" /><path d="M4 14h16" /></Ico>,
  Anchor: (p) => <Ico {...p}><circle cx="12" cy="5" r="2.4" /><path d="M12 7.4V21M5 12a7 7 0 0 0 14 0M5 12H3m16 0h2" /></Ico>,
  Calendar: (p) => <Ico {...p}><rect x="3" y="4" width="18" height="18" rx="2" /><path d="M16 2v4M8 2v4M3 10h18" /></Ico>,
  Lock: (p) => <Ico {...p}><rect x="4" y="11" width="16" height="10" rx="2" /><path d="M8 11V7a4 4 0 0 1 8 0v4" /></Ico>,
  Shield2: (p) => <Ico {...p}><path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6l8-3z" /></Ico>,
  Check: (p) => <Ico {...p}><path d="M20 6 9 17l-5-5" /></Ico>,
  ArrowRight: (p) => <Ico {...p}><path d="M5 12h14M13 6l6 6-6 6" /></Ico>,
  ArrowLeft: (p) => <Ico {...p}><path d="M19 12H5M11 18l-6-6 6-6" /></Ico>,
  Sparkles: (p) => <Ico {...p}><path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6L12 3z" /><path d="M19 14l.8 2.2L22 17l-2.2.8L19 20l-.8-2.2L16 17l2.2-.8L19 14z" /></Ico>,
};

const CLIENT = { name: "Norte Streetwear", account_ref: "norte.com.br", initials: "NS" };

const OBJETIVOS = [
  { value: "escalar_receita", icon: "Rocket",   name: "Escalar receita", desc: "Crescer volume, mesmo pressionando a eficiência." },
  { value: "proteger_margem", icon: "Shield",   name: "Proteger margem / ROAS", desc: "Eficiência acima de volume." },
  { value: "reduzir_cac",     icon: "Scissors", name: "Reduzir CAC", desc: "Baixar o custo de aquisição." },
  { value: "lancar_produto",  icon: "Launch",   name: "Lançar produto / coleção", desc: "Empurrar um lançamento planejado." },
  { value: "estabilizar",     icon: "Anchor",   name: "Estabilizar após mudança", desc: "Reencontrar o ritmo depois de uma virada." },
];
const RISCOS = [
  { value: 1, name: "Conservador" }, { value: 2, name: "Moderado" },
  { value: 3, name: "Ousado" }, { value: 4, name: "Agressivo" },
];
const DATAS = [
  { value: "black_friday", name: "Black Friday" }, { value: "lancamento", name: "Lançamento" },
  { value: "liquidacao", name: "Liquidação" }, { value: "alta_sazonal", name: "Alta sazonal" },
  { value: "outro", name: "Outro" },
];
const RESTRICOES = [
  { value: "budget_travado", name: "Budget travado" }, { value: "estoque", name: "Problema de estoque" },
  { value: "dependencia_canal", name: "Dependência de um canal" }, { value: "atribuicao_quebrada", name: "Atribuição quebrada" },
  { value: "capi_instavel", name: "CAPI instável" }, { value: "nenhuma", name: "Nenhuma" },
];
const PLATAFORMAS = [{ value: "meta", name: "Meta Ads" }, { value: "google", name: "Google Ads" }, { value: "ga4", name: "GA4" }];
const TICKET = [{ value: "ate_80", name: "até R$ 80" }, { value: "80_200", name: "R$ 80–200" }, { value: "200_500", name: "R$ 200–500" }, { value: "500_mais", name: "R$ 500+" }];
const MARGEM = [{ value: "ate_20", name: "até 20%" }, { value: "20_40", name: "20–40%" }, { value: "40_60", name: "40–60%" }, { value: "60_mais", name: "60%+" }];

function ObjOption({ o, selected, onClick }) {
  const Icon = Icons[o.icon];
  return (
    <button className={"opt" + (selected ? " sel" : "")} onClick={onClick}>
      <span className="opt-ic"><Icon size={18} sw={1.9} /></span>
      <span className="opt-tt">
        <span className="opt-name">{o.name}</span>
        <span className="opt-desc">{o.desc}</span>
      </span>
    </button>
  );
}
function Chip({ label, selected, onClick }) {
  return (
    <button className={"chip" + (selected ? " sel" : "")} onClick={onClick}>
      <span className="ck"><Icons.Check size={10} sw={3} /></span>{label}
    </button>
  );
}
function Seg({ opts, value, onPick }) {
  return (
    <div className="seg">
      {opts.map(o => (
        <button key={o.value} className={value === o.value ? "sel" : ""} onClick={() => onPick(o.value)}>{o.name}</button>
      ))}
    </div>
  );
}

// Modo: novo cliente (primeiro acesso) vs. revisão (reabre pré-preenchido, versiona)
const REVISAR = new URLSearchParams(location.search).get("revisar") === "1";
const PRIOR = (() => { try { return JSON.parse(localStorage.getItem("ecp_context")); } catch (e) { return null; } })();
// datas salvas guardam {evento, data_inicio, data_fim}; remapeia para o shape do form ({value,...})
function priorDatasToForm(cal) {
  if (!Array.isArray(cal)) return [];
  return cal.map(c => {
    const known = DATAS.find(d => d.name === c.evento);
    return { value: known ? known.value : "outro", evento: c.evento || "", data_inicio: c.data_inicio || "", data_fim: c.data_fim || "" };
  });
}

function App() {
  const seed = REVISAR && PRIOR ? PRIOR : null;
  const [step, setStep] = useState(1);
  const [objetivo, setObjetivo] = useState(seed?.objetivo_primario ?? null);
  const [risco, setRisco] = useState(seed?.tolerancia_risco ?? 2);
  const [datas, setDatas] = useState(seed ? priorDatasToForm(seed.calendario) : []);  // [{value, evento, data_inicio, data_fim}]
  const [restr, setRestr] = useState(seed?.constraints ?? []);
  const [plataforma, setPlataforma] = useState(seed?.plataforma_principal ?? "meta"); // pré-preenchido de connections (Meta = principal conectada)
  const [ticket, setTicket] = useState(seed?.ticket_faixa ?? null);
  const [margem, setMargem] = useState(seed?.margem_faixa ?? null);
  const [note, setNote] = useState(seed?.context_note ?? "");

  const toggleData = (o) => setDatas(prev => prev.find(d => d.value === o.value)
    ? prev.filter(d => d.value !== o.value)
    : [...prev, { value: o.value, evento: o.value === "outro" ? "" : o.name, data_inicio: "", data_fim: "" }]);
  const setDataField = (value, field, v) => setDatas(prev => prev.map(d => d.value === value ? { ...d, [field]: v } : d));

  const toggleRestr = (v) => {
    if (v === "nenhuma") { setRestr(restr.includes("nenhuma") ? [] : ["nenhuma"]); return; }
    setRestr(prev => { const base = prev.filter(x => x !== "nenhuma"); return base.includes(v) ? base.filter(x => x !== v) : [...base, v]; });
  };

  const overLimit = note.length > NOTE_MAX;
  const canFinish = ticket && margem && plataforma && !overLimit;

  const finish = () => {
    const now = new Date().toISOString();
    let history = [];
    try { history = JSON.parse(localStorage.getItem("ecp_context_history")) || []; } catch (e) { history = []; }
    // Append-only: a versão ativa nunca é editada — vira superseded e uma nova entra.
    const nextVersion = REVISAR && PRIOR ? (PRIOR.version || history.length || 1) + 1 : 1;
    const ctx = {
      version: nextVersion, status: "active", valid_from: now, valid_until: null,
      objetivo_primario: objetivo, tolerancia_risco: risco, plataforma_principal: plataforma,
      ticket_faixa: ticket, margem_faixa: margem,
      constraints: restr,
      calendario: datas.map(d => ({ evento: d.evento || DATAS.find(x => x.value === d.value)?.name || "Evento", data_inicio: d.data_inicio, data_fim: d.data_fim })),
      context_note: note.trim(),
    };
    let nextHistory;
    if (REVISAR && PRIOR) {
      const superseded = history.map(h => h.version === PRIOR.version ? { ...h, status: "superseded", valid_until: now } : h);
      nextHistory = [...superseded, ctx];
    } else {
      nextHistory = [ctx];
    }
    localStorage.setItem("ecp_context", JSON.stringify(ctx));
    localStorage.setItem("ecp_context_history", JSON.stringify(nextHistory));
    localStorage.setItem("ecp_context_reviewed_at", now);
    window.location.href = REVISAR ? "admin-v2.html" : "visao-geral-v2.html";
  };

  return (
    <div className="wrap">
      <div className="shell">
        <div className="ob-top">
          <div className="brand-mark">eP</div>
          <div className="brand-name">EcommPilot<sup>v1</sup></div>
          <div className="ob-steps">
            {[1, 2, 3].map(s => <i key={s} className={s === step ? "on" : s < step ? "done" : ""} />)}
          </div>
        </div>

        {/* ───────────── STEP 1 — objetivo + risco ───────────── */}
        {step === 1 && (
          <div className="ob-card fade">
            <div className="ctx-head">
              <div className="ctx-avatar">{CLIENT.initials}</div>
              <div>
                <div className="ob-eyebrow">{REVISAR ? "Revisar contexto" : "Contexto do negócio"}</div>
                <div className="ctx-store" style={{ marginTop: 4 }}>{REVISAR ? <>Nova versão para <b>{CLIENT.name}</b>{PRIOR ? " · revisando a v" + PRIOR.version : ""}</> : <>Configurando <b>{CLIENT.name}</b> · {CLIENT.account_ref}</>}</div>
              </div>
            </div>
            <h1 className="ob-h">{REVISAR ? "Vamos atualizar o contexto" : "Conte o contexto do seu negócio"}</h1>
            <p className="ob-sub">{REVISAR
              ? "Suas respostas atuais já estão preenchidas. Ajuste o que mudou — ao salvar, criamos uma nova versão sem apagar a anterior. Os cards guardam qual versão usaram."
              : "Isso ajuda a Vera a interpretar seus números do jeito certo — um CPA subindo num lançamento não é o mesmo que num mês estável. Leva 2 minutos e pode ser revisado depois."}</p>

            <div className="q">
              <div className="q-label"><span className="q-num">1</span> Qual o seu objetivo primário no período?</div>
              <div className="q-body">
                <div className="opt-grid">
                  {OBJETIVOS.map(o => <ObjOption key={o.value} o={o} selected={objetivo === o.value} onClick={() => setObjetivo(o.value)} />)}
                </div>
              </div>
            </div>

            <div className="q">
              <div className="q-label"><span className="q-num">2</span> Qual sua tolerância a risco de teste?</div>
              <div className="q-hint">Define o quanto a Vera sugere apostas mais ousadas vs. movimentos seguros.</div>
              <div className="q-body risk">
                <div className="risk-track">
                  {RISCOS.map(r => (
                    <button key={r.value} className={risco === r.value ? "sel" : ""} onClick={() => setRisco(r.value)}>
                      <div className="risk-bars">
                        {[1,2,3,4].map(b => <i key={b} className={b <= r.value ? "on" : ""} style={{ height: 5 + b * 3 }} />)}
                      </div>
                      <div className="risk-name">{r.name}</div>
                    </button>
                  ))}
                </div>
                <div className="risk-ends"><span>Conservador</span><span>Agressivo</span></div>
              </div>
            </div>

            <div className="ob-foot">
              <span className="step-count">Passo 1 de 3</span>
              <button className="btn-next" disabled={!objetivo} onClick={() => setStep(2)}>Continuar <Icons.ArrowRight size={16} /></button>
            </div>
          </div>
        )}

        {/* ───────────── STEP 2 — calendário + restrições ───────────── */}
        {step === 2 && (
          <div className="ob-card fade">
            <div className="ob-eyebrow">Contexto do negócio</div>
            <h1 className="ob-h">O momento do seu negócio</h1>
            <p className="ob-sub">O que está no horizonte e o que limita suas jogadas. Pode deixar em branco se nada se aplica agora.</p>

            <div className="q">
              <div className="q-label"><span className="q-num">3</span> Datas críticas no horizonte</div>
              <div className="q-hint">Selecione o que vem aí — a Vera passa a ler picos e quedas nessas janelas com outro olhar.</div>
              <div className="q-body">
                <div className="chips">
                  {DATAS.map(o => <Chip key={o.value} label={o.name} selected={!!datas.find(d => d.value === o.value)} onClick={() => toggleData(o)} />)}
                </div>
                {datas.length > 0 && (
                  <div className="cal-rows">
                    {datas.map(d => (
                      <div key={d.value} className="cal-row">
                        {d.value === "outro" ? (
                          <div className="cal-name-input">
                            <input type="text" placeholder="Nome do evento" value={d.evento} onChange={e => setDataField(d.value, "evento", e.target.value)} />
                          </div>
                        ) : (
                          <div className="cal-evt"><span className="vd" />{DATAS.find(x => x.value === d.value)?.name}</div>
                        )}
                        <div className="cal-dates">
                          <input type="date" value={d.data_inicio} onChange={e => setDataField(d.value, "data_inicio", e.target.value)} />
                          <span>até</span>
                          <input type="date" value={d.data_fim} onChange={e => setDataField(d.value, "data_fim", e.target.value)} />
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>

            <div className="q">
              <div className="q-label"><span className="q-num">4</span> Restrições conhecidas</div>
              <div className="q-hint">O que a Vera deve assumir como limite ao escrever uma recomendação.</div>
              <div className="q-body">
                <div className="chips">
                  {RESTRICOES.map(o => <Chip key={o.value} label={o.name} selected={restr.includes(o.value)} onClick={() => toggleRestr(o.value)} />)}
                </div>
              </div>
            </div>

            <div className="ob-foot">
              <button className="btn-back" onClick={() => setStep(1)}><Icons.ArrowLeft size={15} /> Voltar</button>
              <button className="btn-next" onClick={() => setStep(3)}>Continuar <Icons.ArrowRight size={16} /></button>
            </div>
          </div>
        )}

        {/* ───────────── STEP 3 — faixas + plataforma + nota ───────────── */}
        {step === 3 && (
          <div className="ob-card fade">
            <div className="ob-eyebrow">Contexto do negócio</div>
            <h1 className="ob-h">Faixas e contexto livre</h1>
            <p className="ob-sub">Capturamos só faixas — nunca valores exatos. No fim, um campo aberto para o que o questionário não previu.</p>

            <div className="q">
              <div className="q-label"><span className="q-num">5</span> Plataforma principal</div>
              <div className="q-hint">Pré-preenchida pelas suas conexões. Confirme ou ajuste.</div>
              <div className="q-body"><Seg opts={PLATAFORMAS} value={plataforma} onPick={setPlataforma} /></div>
            </div>

            <div className="q">
              <div className="q-label"><span className="q-num">6</span> Ticket médio aproximado</div>
              <div className="q-body"><Seg opts={TICKET} value={ticket} onPick={setTicket} /></div>
            </div>

            <div className="q">
              <div className="q-label"><span className="q-num">7</span> Margem aproximada</div>
              <div className="q-body"><Seg opts={MARGEM} value={margem} onPick={setMargem} /></div>
            </div>

            <div className="q">
              <div className="q-label"><span className="q-num">8</span> Algo mais que a Vera precisa saber?</div>
              <div className="q-hint">Tem algo do seu negócio que a Vera precisa saber pra interpretar os números do jeito certo?</div>
              <div className="q-body">
                <textarea className="note-area" maxLength={NOTE_MAX + 40}
                  placeholder="Ex.: público majoritariamente masculino 18–24; dependemos de um fornecedor único de moletom; trocamos de gateway mês passado."
                  value={note} onChange={e => setNote(e.target.value)} />
                <div className="note-foot">
                  <div className="note-warn"><Icons.Lock size={13} /> Não inclua dados pessoais, números de cartão ou nomes de clientes.</div>
                  <div className={"note-count mono" + (overLimit ? " over" : "")}>{note.length}/{NOTE_MAX}</div>
                </div>
              </div>
            </div>

            <div className="priv">
              <Icons.Shield2 size={14} />
              <span>Tudo isso entra na <b>allowlist</b> tipada que vai à IA — em faixas e enums, versionado a cada revisão. Nada é sobrescrito.</span>
            </div>

            <div className="ob-foot">
              <button className="btn-back" onClick={() => setStep(2)}><Icons.ArrowLeft size={15} /> Voltar</button>
              <button className="btn-next" disabled={!canFinish} onClick={finish}>{REVISAR ? "Salvar nova versão" : "Concluir e ver meu painel"} <Icons.ArrowRight size={16} /></button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
