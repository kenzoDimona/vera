<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>EcommPilot — Visão geral</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ──────────────────────────────────────────────────────────────────────────
   EcommPilot — shared visual system
   Continuity of the established identity (Plus Jakarta Sans + JetBrains Mono,
   card-on-canvas, vibrant accents, rounded cards) applied to the briefing's
   five-screen scheme. Interface language: pt-BR.
   ────────────────────────────────────────────────────────────────────────── */

:root {
  --canvas: #EEF0F4;
  --card: #FFFFFF;
  --card-muted: #F6F7F9;
  --line: #E7EAEF;
  --line-strong: #D5D9E0;

  --ink: #0E1116;
  --ink-2: #3A4150;
  --ink-3: #6B7280;
  --ink-4: #9AA1AC;
  --ink-5: #C4C9D1;

  /* Brand accents (identity signatures) */
  --violet: #6D5BFF;
  --violet-soft: #EFEBFF;
  --indigo: #4458F5;
  --pink: #FF6B9B;
  --pink-soft: #FFE7EE;
  --teal: #14B8A6;
  --teal-soft: #DCFAF4;
  --amber: #F59E0B;
  --amber-soft: #FEF3C7;
  --rose: #F43F5E;
  --rose-soft: #FFE4E6;
  --sky: #38BDF8;
  --sky-soft: #E0F2FE;
  --slate: #64748B;
  --slate-soft: #EDF0F4;

  /* Severity → color (briefing: crítico/alto/médio/oportunidade) */
  --sev-critico: var(--rose);
  --sev-critico-soft: var(--rose-soft);
  --sev-alto: var(--amber);
  --sev-alto-soft: var(--amber-soft);
  --sev-medio: var(--slate);
  --sev-medio-soft: var(--slate-soft);
  --sev-oportunidade: var(--teal);
  --sev-oportunidade-soft: var(--teal-soft);

  --primary: #0E1116;
  --primary-ink: #FFFFFF;

  --radius-xl: 22px;
  --radius-lg: 18px;
  --radius: 14px;
  --radius-sm: 10px;
  --radius-xs: 8px;

  --shadow-card: 0 1px 0 rgba(15,17,22,0.02), 0 1px 3px rgba(15,17,22,0.04), 0 12px 28px -16px rgba(15,17,22,0.10);
  --shadow-pop: 0 1px 0 rgba(15,17,22,0.02), 0 24px 48px -18px rgba(15,17,22,0.18);

  --pad: 20px;
  --gap: 14px;
}

[data-density="compact"] { --pad: 14px; --gap: 10px; }
[data-density="comfy"]   { --pad: 26px; --gap: 18px; }

[data-theme="dark"] {
  --canvas: #0B0D11;
  --card: #14171D;
  --card-muted: #1A1E26;
  --line: #232831;
  --line-strong: #2E343F;

  --ink: #F1F3F7;
  --ink-2: #C7CDD7;
  --ink-3: #8B92A0;
  --ink-4: #5F6776;
  --ink-5: #3F4654;

  --violet: #8B7BFF;
  --violet-soft: #221C45;
  --pink: #FF7DA8;
  --pink-soft: #3D1B2C;
  --teal: #2DD4BF;
  --teal-soft: #103833;
  --amber: #FBBF24;
  --amber-soft: #3A2B0C;
  --rose: #FB7185;
  --rose-soft: #3A1820;
  --sky: #5DC9FB;
  --sky-soft: #0E2A3D;
  --slate: #94A3B8;
  --slate-soft: #1E2530;

  --primary: #FFFFFF;
  --primary-ink: #0E1116;

  --shadow-card: 0 1px 0 rgba(255,255,255,0.02), 0 12px 28px -16px rgba(0,0,0,0.6);
  --shadow-pop: 0 24px 48px -18px rgba(0,0,0,0.7);
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--canvas);
  color: var(--ink);
  font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui, -apple-system, sans-serif;
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "tnum"; letter-spacing: -0.01em; }

/* ── App shell ───────────────────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 14px;
  padding: 14px;
  min-height: 100vh;
}

/* ── Sidebar ─────────────────────────────────────────────── */
.sidebar {
  background: var(--card);
  border-radius: var(--radius-xl);
  padding: 20px 14px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  box-shadow: var(--shadow-card);
  position: sticky;
  top: 14px;
  height: calc(100vh - 28px);
}
.brand { display: flex; align-items: center; gap: 10px; padding: 4px 10px 22px; }
.brand-mark {
  width: 32px; height: 32px; border-radius: 10px;
  background: linear-gradient(135deg, var(--violet) 0%, var(--pink) 100%);
  display: grid; place-items: center;
  color: white; font-weight: 700; font-size: 14px; letter-spacing: -0.02em;
  box-shadow: 0 4px 12px -4px rgba(109, 91, 255, 0.5);
}
.brand-name { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; color: var(--ink); }
.brand-name sup { font-size: 9px; font-weight: 600; color: var(--ink-3); margin-left: 2px; vertical-align: super; }

.store-switcher {
  margin: 0 0 14px; padding: 10px 12px;
  border: 1px solid var(--line);
  background: var(--card-muted);
  border-radius: var(--radius);
  cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  transition: all .15s;
  text-decoration: none;
}
.store-switcher:hover { border-color: var(--line-strong); }
.store-avatar {
  width: 28px; height: 28px; border-radius: 8px;
  background: linear-gradient(135deg, var(--teal), var(--sky));
  flex-shrink: 0; color: white;
  display: grid; place-items: center;
  font-size: 11px; font-weight: 700; letter-spacing: -0.02em;
}
.store-meta { flex: 1; min-width: 0; }
.store-name { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.store-url { font-size: 11px; color: var(--ink-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.store-chevron { color: var(--ink-4); flex-shrink: 0; }

.nav-section-label {
  font-size: 10.5px; font-weight: 600; color: var(--ink-4);
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 14px 10px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 12px; border-radius: var(--radius-sm);
  color: var(--ink-2); cursor: pointer;
  font-size: 13px; font-weight: 500;
  transition: all .12s; user-select: none;
  text-decoration: none;
}
.nav-item:hover { background: var(--card-muted); color: var(--ink); }
.nav-item.active {
  background: var(--ink); color: var(--card);
  font-weight: 600;
  box-shadow: 0 4px 10px -4px rgba(15,17,22,0.25);
}
[data-theme="dark"] .nav-item.active {
  background: var(--card-muted); color: var(--ink);
  box-shadow: inset 0 0 0 1px var(--line-strong);
}
.nav-item .icon { width: 16px; height: 16px; color: var(--ink-3); flex-shrink: 0; }
.nav-item:hover .icon { color: var(--ink); }
.nav-item.active .icon { color: var(--card); }
[data-theme="dark"] .nav-item.active .icon { color: var(--violet); }
.nav-item .badge {
  margin-left: auto; font-size: 10.5px; font-weight: 600;
  padding: 1px 6px; border-radius: 999px;
  background: var(--rose); color: white;
  line-height: 1.4; min-width: 18px; text-align: center;
}
.nav-item.active .badge { background: var(--rose); color: white; }
.nav-item .badge.muted { background: var(--card-muted); color: var(--ink-3); }
.nav-item.active .badge.muted { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.85); }
.nav-spacer { flex: 1; }

.brief-card {
  margin: 14px 2px 4px;
  padding: 16px;
  background: linear-gradient(160deg, #1B1F2A 0%, #0E1116 100%);
  border-radius: var(--radius);
  color: white;
  position: relative; overflow: hidden;
}
.brief-card::before {
  content: "";
  position: absolute; top: -30px; right: -30px;
  width: 90px; height: 90px; border-radius: 50%;
  background: radial-gradient(circle, rgba(109,91,255,0.6), transparent 70%);
}
[data-theme="dark"] .brief-card {
  background: linear-gradient(160deg, var(--violet-soft) 0%, var(--card-muted) 100%);
  border: 1px solid var(--line);
}
.brief-pill {
  display: inline-flex; align-items: center; gap: 4px;
  background: linear-gradient(135deg, var(--violet), var(--pink));
  padding: 2px 8px; border-radius: 999px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
  margin-bottom: 8px; position: relative; z-index: 1;
}
.brief-title { font-size: 13.5px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 4px; position: relative; z-index: 1; }
[data-theme="dark"] .brief-title { color: var(--ink); }
.brief-sub { font-size: 11.5px; color: rgba(255,255,255,0.62); margin-bottom: 12px; line-height: 1.45; position: relative; z-index: 1; }
[data-theme="dark"] .brief-sub { color: var(--ink-3); }
.brief-btn {
  appearance: none; border: 0;
  background: white; color: #0E1116;
  padding: 8px 14px; border-radius: 999px;
  font-family: inherit; font-size: 12px; font-weight: 600;
  cursor: pointer; width: 100%; position: relative; z-index: 1;
}
[data-theme="dark"] .brief-btn { background: var(--ink); color: var(--card); }

.nav-footer {
  padding: 12px 8px 4px; border-top: 1px solid var(--line);
  margin-top: 10px;
  display: flex; align-items: center; gap: 10px;
}
.user-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, var(--amber), var(--rose));
  color: white; display: grid; place-items: center;
  font-size: 11px; font-weight: 700;
}
.user-name { font-size: 12.5px; font-weight: 600; color: var(--ink); }
.user-role { font-size: 11px; color: var(--ink-3); }

/* ── Main column + topbar ────────────────────────────────── */
.main { min-width: 0; display: flex; flex-direction: column; gap: var(--gap); }

.topbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; padding: 4px 6px; flex-wrap: wrap;
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.topbar h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.025em; margin: 0; }
.topbar-sub { font-size: 13px; color: var(--ink-3); margin-top: 2px; }
.topbar-actions { display: flex; align-items: center; gap: 8px; }

.seg-pill {
  display: inline-flex; background: var(--card);
  border: 1px solid var(--line); border-radius: 999px;
  padding: 3px; box-shadow: var(--shadow-card);
}
.seg-pill button {
  appearance: none; border: 0; background: transparent;
  color: var(--ink-3); padding: 6px 14px; white-space: nowrap;
  font-family: inherit; font-size: 12.5px; font-weight: 500;
  border-radius: 999px; cursor: pointer; transition: all .15s;
}
.seg-pill button:hover { color: var(--ink); }
.seg-pill button.active { background: var(--ink); color: var(--card); }
[data-theme="dark"] .seg-pill button.active { background: var(--violet); color: white; }

.icon-btn {
  appearance: none; width: 38px; height: 38px; border-radius: 50%;
  background: var(--card); border: 1px solid var(--line);
  cursor: pointer; color: var(--ink-2);
  display: grid; place-items: center;
  transition: all .15s; position: relative; box-shadow: var(--shadow-card);
}
.icon-btn:hover { color: var(--ink); border-color: var(--line-strong); }
.icon-btn .ping {
  position: absolute; top: 9px; right: 10px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--rose); border: 2px solid var(--card);
}

.btn-primary-pill {
  appearance: none;
  background: linear-gradient(135deg, var(--violet) 0%, var(--indigo) 100%);
  color: white; border: 0;
  padding: 10px 18px; border-radius: 999px; white-space: nowrap;
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  box-shadow: 0 6px 16px -4px rgba(109, 91, 255, 0.45);
  transition: transform .12s;
}
.btn-primary-pill:hover { transform: translateY(-1px); }

.btn-pill {
  appearance: none; background: var(--card); color: var(--ink);
  border: 1px solid var(--line);
  padding: 9px 16px; border-radius: 999px;
  font-family: inherit; font-size: 12.5px; font-weight: 600;
  cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  box-shadow: var(--shadow-card); transition: all .15s;
}
.btn-pill:hover { border-color: var(--line-strong); }
.btn-pill.dark { background: var(--ink); color: var(--card); border-color: var(--ink); }
[data-theme="dark"] .btn-pill.dark { background: var(--violet); color: white; border-color: var(--violet); }

.live-text {
  font-size: 12px; color: var(--ink-3);
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--card); padding: 6px 12px; border-radius: 999px;
  border: 1px solid var(--line); box-shadow: var(--shadow-card);
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.5);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.5); }
  50% { box-shadow: 0 0 0 6px rgba(20, 184, 166, 0); }
}

/* ── Severity tag (shared) ───────────────────────────────── */
.sev-tag {
  font-size: 11.5px; font-weight: 600;
  letter-spacing: -0.01em;
  padding: 2px 10px; border-radius: 999px;
  display: inline-flex; align-items: center; gap: 5px;
  white-space: nowrap;
}
.sev-tag[data-sev="critico"]      { background: var(--sev-critico-soft);      color: var(--sev-critico); }
.sev-tag[data-sev="alto"]         { background: var(--sev-alto-soft);         color: var(--sev-alto); }
.sev-tag[data-sev="medio"]        { background: var(--sev-medio-soft);        color: var(--sev-medio); }
.sev-tag[data-sev="oportunidade"] { background: var(--sev-oportunidade-soft); color: var(--sev-oportunidade); }
[data-theme="dark"] .sev-tag[data-sev="medio"] { color: var(--ink-2); }

/* Trigger / platform meta chips */
.meta-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; font-weight: 600;
  color: var(--ink-3); background: var(--card-muted);
  padding: 2px 7px; border-radius: 6px;
  white-space: nowrap;
}
.meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-4); flex-shrink: 0; }
.meta-src { font-size: 11.5px; color: var(--ink-3); }
.meta-time { font-size: 11.5px; color: var(--ink-4); }

/* Confidence badge */
.conf-badge {
  font-size: 10.5px; font-weight: 600;
  padding: 2px 8px; border-radius: 999px;
  display: inline-flex; align-items: center; gap: 5px;
}
.conf-badge[data-conf="alta"]  { background: var(--teal-soft);  color: var(--teal); }
.conf-badge[data-conf="média"] { background: var(--amber-soft); color: var(--amber); }
.conf-badge[data-conf="baixa"] { background: var(--slate-soft); color: var(--slate); }
[data-theme="dark"] .conf-badge[data-conf="baixa"] { color: var(--ink-2); }

/* ── Generic card ────────────────────────────────────────── */
.panel-card {
  background: var(--card);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-card);
}
.section-label {
  font-size: 11px; font-weight: 700;
  color: var(--ink-3); letter-spacing: 0.06em; text-transform: uppercase;
  margin: 0 0 10px;
}

/* ── Num pill inside narrative ───────────────────────────── */
.num {
  font-family: 'JetBrains Mono', monospace; font-weight: 600;
  color: var(--ink); background: var(--card-muted);
  padding: 0 5px; border-radius: 4px; font-size: 0.88em;
}
.num.down { color: var(--rose); background: var(--rose-soft); }
.num.up   { color: var(--teal); background: var(--teal-soft); }

/* ── Platform glyph + avatar ─────────────────────────────── */
/* ── Vetor chips + extra platform tints ──────────────────── */
.vec-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 10.5px; font-weight: 600; line-height: 1.25; padding: 2px 9px 2px 7px; border-radius: 999px; white-space: nowrap; }
.vec-chip.lg { font-size: 11.5px; padding: 3px 11px 3px 9px; }
.vec-chip svg { flex-shrink: 0; }
.vec-chip.vec-violet { background: var(--violet-soft); color: var(--violet); }
.vec-chip.vec-indigo { background: var(--violet-soft); color: var(--indigo); }
.vec-chip.vec-pink   { background: var(--pink-soft);   color: var(--pink); }
.vec-chip.vec-sky    { background: var(--sky-soft);    color: var(--sky); }
.vec-chip.vec-amber  { background: var(--amber-soft);  color: var(--amber); }
.vec-chip.vec-teal   { background: var(--teal-soft);   color: var(--teal); }
.vec-chip.vec-slate  { background: var(--slate-soft);  color: var(--slate); }
[data-theme="dark"] .vec-chip.vec-amber { color: var(--amber); }
.plat-glyph.plat-pink { background: var(--pink-soft); color: var(--pink); }
.plat-glyph.plat-teal { background: var(--teal-soft); color: var(--teal); }
.plat-glyph { display: inline-grid; place-items: center; flex-shrink: 0; }
.plat-glyph.plat-sky    { background: var(--sky-soft);    color: var(--sky); }
.plat-glyph.plat-amber  { background: var(--amber-soft);  color: var(--amber); }
.plat-glyph.plat-violet { background: var(--violet-soft); color: var(--violet); }
[data-theme="dark"] .plat-glyph.plat-amber { color: var(--amber); }

.avatar {
  display: inline-grid; place-items: center;
  border-radius: 50%; color: white; font-weight: 700;
  letter-spacing: -0.02em; flex-shrink: 0;
}

.narrative {
  font-size: 13px; color: var(--ink-2);
  line-height: 1.55; margin: 0; text-wrap: pretty;
}

/* ── Modal scrim + slide-over (Card detalhe) ─────────────── */
.scrim {
  position: fixed; inset: 0;
  background: rgba(15, 17, 22, 0.34);
  backdrop-filter: blur(2px);
  z-index: 50; opacity: 0; pointer-events: none;
  transition: opacity .22s;
}
.scrim.open { opacity: 1; pointer-events: auto; }

/* Empty state */
.empty {
  text-align: center; padding: 56px 20px; color: var(--ink-3);
}
.empty .em-mark {
  width: 44px; height: 44px; margin: 0 auto 12px;
  border-radius: 14px; background: var(--teal-soft); color: var(--teal);
  display: grid; place-items: center;
}
.empty-title { font-size: 15px; color: var(--ink); font-weight: 600; margin-bottom: 4px; }
.empty-sub { font-size: 13px; max-width: 320px; margin: 0 auto; }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 760px) {
  .app { grid-template-columns: 1fr; padding: 10px; }
}

</style>
<style>
/* Mobile responsivity — shared across all EcommPilot pages.
   Loaded by Dashboard, Alerts, History, Integrations. */

/* Mobile header (hidden on desktop) */
.mobile-header {
  display: none;
  position: sticky; top: 0; z-index: 50;
  background: var(--card);
  border-bottom: 1px solid var(--line);
  padding: 10px 14px;
  align-items: center; gap: 10px;
  height: 54px;
}
.mobile-header .brand-mark { width: 30px; height: 30px; }
.mobile-header .brand-name { font-size: 14px; font-weight: 700; letter-spacing: -0.02em; }
.mobile-header .menu-btn,
.mobile-header .right-btn {
  appearance: none; border: 1px solid var(--line);
  background: var(--card-muted);
  width: 36px; height: 36px; border-radius: 10px;
  display: grid; place-items: center;
  cursor: pointer; color: var(--ink-2);
  flex-shrink: 0;
}
.mobile-header .right-btn { position: relative; }
.mobile-header .right-btn .ping {
  position: absolute; top: 7px; right: 8px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--rose); border: 2px solid var(--card);
}
.mobile-header .spacer { flex: 1; }

/* Backdrop + drawer when sidebar is opened on mobile */
.sidebar-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(15, 17, 22, 0.5);
  backdrop-filter: blur(2px);
  z-index: 99;
  animation: fade-in .18s ease;
}
@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
@keyframes slide-in { from { transform: translateX(-100%); } to { transform: translateX(0); } }

/* ── ≤1100px: tighten layouts ── */
@media (max-width: 1100px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .split { grid-template-columns: 1fr; }
  .detail-card { position: static; max-height: none; }
  .history-grid { grid-template-columns: 1fr; }
}

/* ── ≤900px: switch to mobile shell ── */
@media (max-width: 900px) {
  .app {
    grid-template-columns: 1fr !important;
    padding: 0 !important;
    gap: 0 !important;
  }
  .mobile-header { display: flex; }

  /* Sidebar becomes a left-drawer, hidden by default */
  .sidebar {
    position: fixed !important;
    top: 0 !important; left: 0;
    width: 280px;
    height: 100vh !important;

// Mobile header — shared across all EcommPilot pages.
// Renders a sticky top bar that opens the sidebar drawer on small screens.
// Body data-nav-open="true" is what triggers the drawer slide-in.

const MobileHeader = ({ title }) => {
  const [open, setOpen] = React.useState(false);
  React.useEffect(() => {
    document.body.dataset.navOpen = open ? "true" : "false";
    if (open) {
      document.body.style.overflow = "hidden";
    } else {
      document.body.style.overflow = "";
    }
    return () => { document.body.style.overflow = ""; };
  }, [open]);

  // Close on Escape
  React.useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") setOpen(false); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  return (
    <>
      <div className="mobile-header">
        <button className="menu-btn" aria-label="Open menu" onClick={() => setOpen(true)}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M3 6h18M3 12h18M3 18h18" />
          </svg>
        </button>
        <div className="brand-mark">E</div>
        <div className="brand-name">{title || "EcommPilot"}</div>
        <div className="spacer" />
        <button className="right-btn" aria-label="Notifications">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
            <path d="M6 8a6 6 0 1 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
            <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
          </svg>
          <span className="ping" />
        </button>
      </div>
      {open && <div className="sidebar-backdrop" onClick={() => setOpen(false)} />}
    </>
  );
};

window.MobileHeader = MobileHeader;

</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  <script type="text/babel">
// EcommPilot — shell e componentes compartilhados (Sidebar, helpers visuais).

const SEV_LABEL = { critico: "Crítico", alto: "Alto", medio: "Médio", oportunidade: "Oportunidade" };
const SEV_COLOR = {
  critico: "var(--sev-critico)", alto: "var(--sev-alto)",
  medio: "var(--sev-medio)", oportunidade: "var(--sev-oportunidade)",
};
const SEV_GLYPH = {
  critico: (p) => <I.Lightning {...p} />,
  alto: (p) => <I.TrendDown {...p} />,
  medio: (p) => <I.TrendDown {...p} />,
  oportunidade: (p) => <I.TrendUp {...p} />,
};

// ── Severity tag ────────────────────────────────────────────
function SevTag({ sev, glyph = false, size = 12 }) {
  const G = SEV_GLYPH[sev];
  return (
    <span className="sev-tag" data-sev={sev}>
      {glyph && <G size={size - 1} sw={2.1} />}
      {SEV_LABEL[sev]}
    </span>
  );
}

// ── Platform glyph (square chip) ────────────────────────────
function PlatformGlyph({ icon, size = 30, r = 9 }) {
  const Comp = I[icon] || I.Analytics;
  const tint = { Meta: "sky", Google: "amber", Analytics: "violet", Mail: "amber", Search: "sky", SocialV: "pink", Link: "teal" }[icon] || "violet";
  return (
    <span className={"plat-glyph plat-" + tint} style={{ width: size, height: size, borderRadius: r }}>
      <Comp size={Math.round(size * 0.5)} sw={1.9} />
    </span>
  );
}

// ── Avatar (initials) ───────────────────────────────────────
function Avatar({ initials, size = 26, grad = "amber-rose" }) {
  const grads = {
    "amber-rose": "linear-gradient(135deg, var(--amber), var(--rose))",
    "teal-sky": "linear-gradient(135deg, var(--teal), var(--sky))",
    "violet-pink": "linear-gradient(135deg, var(--violet), var(--pink))",
    "indigo-violet": "linear-gradient(135deg, var(--indigo), var(--violet))",
  };
  return (
    <span className="avatar" style={{ width: size, height: size, fontSize: Math.round(size * 0.4), background: grads[grad] }}>
      {initials}
    </span>
  );
}

// ── Sparkline ───────────────────────────────────────────────
function Sparkline({ series, width = 120, height = 32, stroke = "currentColor", fill = null, domain = null, sw = 1.6 }) {
  const min = domain ? domain[0] : Math.min(...series);
  const max = domain ? domain[1] : Math.max(...series);
  const range = max - min || 1;
  const stepX = width / (series.length - 1);
  const pts = series.map((v, i) => [i * stepX, height - ((v - min) / range) * height]);
  const d = pts.map(([x, y], i) => `${i === 0 ? "M" : "L"}${x.toFixed(1)},${y.toFixed(1)}`).join(" ");
  const last = pts[pts.length - 1];
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: "block", overflow: "visible" }}>
      {fill && <path d={`${d} L${width},${height} L0,${height} Z`} fill={fill} opacity="0.16" />}
      <path d={d} stroke={stroke} strokeWidth={sw} fill="none" strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={last[0]} cy={last[1]} r="2.4" fill={stroke} />
    </svg>
  );
}

// ── Narrative: interpola {prev|x} e {now|x} ─────────────────
function Narrative({ text, dir, className = "narrative" }) {
  const parts = [];
  const re = /\{(prev|now)\|([^}]+)\}/g;
  let last = 0, m;
  while ((m = re.exec(text))) {
    if (m.index > last) parts.push({ k: "t", v: text.slice(last, m.index) });
    parts.push({ k: "n", role: m[1], v: m[2] });
    last = m.index + m[0].length;
  }
  if (last < text.length) parts.push({ k: "t", v: text.slice(last) });
  return (
    <p className={className}>
      {parts.map((p, i) => {
        if (p.k === "t") return <span key={i}>{p.v}</span>;
        const cls = p.role === "now"
          ? (dir === "down" ? "num down" : dir === "up" ? "num up" : "num")
          : "num";
        return <span key={i} className={cls}>{p.v}</span>;
      })}
    </p>
  );
}

// ── Sidebar (nav compartilhada) ─────────────────────────────
function Sidebar({ active, openCount = 0 }) {
  const items = [
    { key: "visao",  label: "Visão geral", href: "visao-geral-v2.html", icon: "Dashboard" },
    { key: "board",  label: "Alertas",     href: "board-v2.html",       icon: "Columns", badge: openCount },
    { key: "result", label: "Resultados",  href: "resultados-v2.html",  icon: "Results" },
  ];
  return (
    <aside className="sidebar">
      <div className="brand">
        <div className="brand-mark">E</div>
        <div className="brand-name">EcommPilot<sup>®</sup></div>
      </div>

      <a className="store-switcher" href="admin-v2.html">
        <span className="store-avatar">{CLIENT.initials}</span>
        <div className="store-meta">
          <div className="store-name">{CLIENT.name}</div>
          <div className="store-url">{CLIENT.account_ref}</div>
        </div>
        <I.ChevronDown size={14} className="store-chevron" />
      </a>

      <div className="nav-section-label">Espaço de trabalho</div>
      {items.map((it) => (
        <a key={it.key} className={"nav-item" + (active === it.key ? " active" : "")} href={it.href}>
          {React.createElement(I[it.icon], { size: 15, className: "icon" })}
          {it.label}
          {it.badge > 0 && <span className="badge">{it.badge}</span>}
        </a>
      ))}

      <div className="nav-section-label">Configuração</div>
      <a className={"nav-item" + (active === "admin" ? " active" : "")} href="admin-v2.html">
        <I.Settings size={15} className="icon" />
        Admin
        <span className="badge muted">3</span>
      </a>

      <div className="nav-spacer" />

      <div className="brief-card">
        <div className="brief-pill">✦ Pilot</div>
        <div className="brief-title">Regras detectam, IA humaniza</div>
        <div className="brief-sub">Cada card já vem com hipótese e primeira ação escritas. Sem pedir análise em tempo real.</div>
        <a className="brief-btn" href="board-v2.html" style={{ display: "block", textAlign: "center", textDecoration: "none" }}>Ver o board</a>
      </div>

      <div className="nav-footer">
        <Avatar initials={USER.initials} size={30} grad="amber-rose" />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div className="user-name">{USER.name}</div>
          <div className="user-role">{USER.role}</div>
        </div>
        <I.More size={14} style={{ color: "var(--ink-4)" }} />
      </div>
    </aside>
  );
}

// ── Vetores de crescimento (7) ──────────────────────────────
const VECTORS = {
  midia_paga: { label: "Mídia paga", icon: "Megaphone", tint: "violet" },
  social:     { label: "Social",     icon: "SocialV",   tint: "pink" },
  seo:        { label: "SEO",        icon: "Search",    tint: "sky" },
  email:      { label: "Email",      icon: "Mail",      tint: "amber" },
  ga4:        { label: "GA4",        icon: "Analytics", tint: "indigo" },
  retencao:   { label: "Retenção",   icon: "Repeat",    tint: "teal" },
  atribuicao: { label: "Atribuição", icon: "Link",      tint: "slate" },
};
const VECTOR_ORDER = ["midia_paga","social","seo","email","ga4","retencao","atribuicao"];
function VectorChip({ vector, size = "sm" }) {
  const v = VECTORS[vector];
  if (!v) return null;
  const Icon = I[v.icon] || I.Analytics;
  return (
    <span className={"vec-chip vec-" + v.tint + (size === "lg" ? " lg" : "")}>
      <Icon size={size === "lg" ? 13 : 11} sw={1.9} />{v.label}
    </span>

}

Object.assign(window, { SEV_LABEL, SEV_COLOR, SevTag, PlatformGlyph, Avatar, Sparkline, Narrative, Sidebar, VECTORS, VECTOR_ORDER, VectorChip });

    conectado: { cls: "ok",   label: "conectado" },
    atraso:    { cls: "warn", label: "atraso na sincronização" },
    erro:      { cls: "err",  label: "erro de conexão" },
  };
  return (
    <section className="block" data-tour="conexoes">
      <div className="block-head">
        <div className="block-title">Conexões <span className="sub">7 vetores de crescimento</span></div>
        <a className="link-btn" href="admin-v2.html">Gerenciar <I.ArrowRight size={12} /></a>
      </div>
      <div>
        {CONNECTIONS.map(cx => {
          const s = statusMap[cx.status] || statusMap.conectado;
          return (
            <div key={cx.id} className="cx-row">
              <PlatformGlyph icon={cx.icon} size={34} r={10} />
              <div className="cx-meta">
                <div className="cx-name">{cx.platform}</div>
                <div className="cx-sync">{cx.vector && <VectorChip vector={cx.vector} />} <span className="cx-sync-t">sincronizado {cx.last_sync}</span></div>
              </div>
              <span className={"status-badge " + s.cls}><span className="status-dot" />{s.label}</span>
            </div>
          );
        })}
      </div>
      <div className="cx-note">
        <I.Eye size={13} /> Apenas leitura — o status é gerenciado no Admin.
      </div>
    </section>
  );
}

function RecentAlerts({ recent, total }) {
  return (
    <section className="block">
      <div className="block-head">
        <div className="block-title">Alertas recentes <span className="sub">{total} em aberto</span></div>
        <a className="btn-pill dark" href="board-v2.html" style={{ textDecoration: "none" }}>
          Ver o board <I.ArrowRight size={13} />
        </a>
      </div>
      <div>
        {recent.map(c => (
          <a key={c.id} className="recent-row" href={"board-v2.html?card=" + c.id}>
            <span className="recent-glyph" data-sev={c.severity}>
              {React.createElement(SEV_GLYPH_LOCAL[c.severity], { size: 16, sw: 2.1 })}
            </span>
            <div className="recent-body">
              <div className="recent-head">{c.headline}</div>
              <div className="recent-meta">
                <SevTag sev={c.severity} />

// ── Tour interativo (Tela 0B) — spotlight guiado pela Visão geral ──
const TOUR_STEPS = [
  { sel: null, place: "center", title: "Bem-vindo ao ecommPilot",
    body: "Em 5 passos rápidos: como a Visão geral lê suas lojas e onde agir. Você pode pular a qualquer momento." },
  { sel: '[data-tour="metrics"]', place: "bottom", title: "Seus números do período",
    body: "Receita, pedidos, ROAS e CPA num relance — com tendência dos últimos 7 dias. Troque a janela no canto superior direito." },
  { sel: '[data-tour="conexoes"]', place: "left", title: "7 vetores de crescimento",
    body: "Cada fonte de dados alimenta um vetor — VEC. O ecommPilot cruza todos para encontrar o que move o resultado. Aqui é só leitura; o status mora no Admin." },
  { sel: '[data-tour="alertas"]', place: "top", title: "Alertas que viram ação",
    body: "O sistema destaca o que mudou e por quê. Clique num alerta para abrir o detalhe, com hipótese, primeira ação e o Conselheiro IA." },
  { sel: '[data-tour="pilot"]', place: "bottom", title: "Pergunte ao Pilot",
    body: "Precisa de um recorte que não está na tela? Pergunte em linguagem natural e o Pilot responde com base nos seus dados conectados." },
];

function Tour({ onClose }) {
  const [i, setI] = useState(0);
  const [box, setBox] = useState(null);
  const step = TOUR_STEPS[i];
  const last = i === TOUR_STEPS.length - 1;

  const measure = React.useCallback(() => {
    if (!step.sel) { setBox(null); return; }
    const el = document.querySelector(step.sel);
    if (!el) { setBox(null); return; }
    const r = el.getBoundingClientRect();
    const pad = 8;
    setBox({ top: r.top - pad, left: r.left - pad, width: r.width + pad * 2, height: r.height + pad * 2 });
  }, [step]);

  useEffect(() => {
    const el = step.sel && document.querySelector(step.sel);
    if (el) el.scrollIntoView({ block: "center", behavior: "smooth" });
    const id = setTimeout(measure, el ? 240 : 0);
    window.addEventListener("resize", measure);
    return () => { clearTimeout(id); window.removeEventListener("resize", measure); };
  }, [i, measure, step]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") onClose();
      else if (e.key === "ArrowRight") setI(v => Math.min(v + 1, TOUR_STEPS.length - 1));
      else if (e.key === "ArrowLeft") setI(v => Math.max(v - 1, 0));
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);

  // Position the popover relative to the spotlight (or centered for intro).
  const popStyle = (() => {
    const W = 312, vw = window.innerWidth, vh = window.innerHeight, gap = 16;
    if (!box) return { top: vh / 2 - 120, left: vw / 2 - W / 2 };
    let top, left;
    if (step.place === "bottom") { top = box.top + box.height + gap; left = box.left + box.width / 2 - W / 2; }
    else if (step.place === "top") { top = box.top - gap - 180; left = box.left + box.width / 2 - W / 2; }
    else if (step.place === "left") { top = box.top; left = box.left - W - gap; }
    else { top = box.top; left = box.left + box.width + gap; }
    left = Math.max(gap, Math.min(left, vw - W - gap));
    top = Math.max(gap, Math.min(top, vh - 210));
    return { top, left };
  })();

  return (
    <div className="tour-overlay" onClick={(e) => { if (e.target.classList.contains("tour-overlay")) onClose(); }}>
      {box && <div className="tour-spot" style={box} />}
      <div className="tour-pop" style={popStyle} onClick={e => e.stopPropagation()}>
        <div className="tour-step-no">Passo {i + 1} <span className="of">de {TOUR_STEPS.length}</span></div>
        <h3 className="tour-h">{step.title}</h3>
        <p className="tour-p">{step.body.split(/(VEC)/).map((part, k) =>
          part === "VEC"
            ? <span key={k} className="vchip-inline"><VectorChip vector="midia_paga" /></span>
            : part)}</p>
        <div className="tour-foot">
          <div className="tour-dots">{TOUR_STEPS.map((_, k) => <i key={k} className={k === i ? "on" : ""} />)}</div>
          {i > 0 && <button className="tour-back" onClick={() => setI(v => v - 1)}>Voltar</button>}
          {!last
            ? <button className="tour-next" onClick={() => setI(v => v + 1)}>Próximo <I.ArrowRight size={13} /></button>
            : <button className="tour-next" onClick={onClose}>Começar <I.ArrowRight size={13} /></button>}
        </div>
        {!last && <button className="tour-skip" onClick={onClose} style={{ position: "absolute", top: 12, right: 12 }}>Pular</button>}
      </div>
    </div>
  );
}

const SEV_GLYPH_LOCAL = {
  critico: I.Lightning, alto: I.TrendDown, medio: I.TrendDown, oportunidade: I.TrendUp,
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
