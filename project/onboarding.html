<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>EcommPilot — Vamos começar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --canvas: #EEF0F4; --card: #FFFFFF; --card-muted: #F6F7F9;
  --line: #E7EAEF; --line-strong: #D5D9E0;
  --ink: #0E1116; --ink-2: #3A4150; --ink-3: #6B7280; --ink-4: #9AA1AC; --ink-5: #C4C9D1;
  --violet: #6D5BFF; --violet-soft: #EFEBFF; --indigo: #4458F5;
  --pink: #FF6B9B; --pink-soft: #FFE7EE; --teal: #14B8A6; --teal-soft: #DCFAF4;
  --amber: #F59E0B; --amber-soft: #FEF3C7; --rose: #F43F5E; --rose-soft: #FFE4E6;
  --sky: #38BDF8; --sky-soft: #E0F2FE; --slate: #64748B; --slate-soft: #EDF0F4;
  --primary: #0E1116; --primary-ink: #FFFFFF;
  --radius-xl: 22px; --radius-lg: 18px; --radius: 14px; --radius-sm: 10px;
  --shadow-card: 0 1px 0 rgba(15,17,22,0.02), 0 1px 3px rgba(15,17,22,0.04), 0 12px 28px -16px rgba(15,17,22,0.10);
  --shadow-pop: 0 1px 0 rgba(15,17,22,0.02), 0 24px 48px -18px rgba(15,17,22,0.18);
}
[data-theme="dark"] {
  --canvas: #0B0D11; --card: #14171D; --card-muted: #1A1E26;
  --line: #232831; --line-strong: #2E343F;
  --ink: #F1F3F7; --ink-2: #C7CDD7; --ink-3: #8B92A0; --ink-4: #5F6776; --ink-5: #3F4654;
  --violet: #8B7BFF; --violet-soft: #221C45; --pink: #FF7DA8; --pink-soft: #3D1B2C;
  --teal: #2DD4BF; --teal-soft: #103833; --amber: #FBBF24; --amber-soft: #3A2B0C;
  --rose: #FB7185; --rose-soft: #3A1820; --sky: #5DC9FB; --sky-soft: #0E2A3D;
  --slate: #94A3B8; --slate-soft: #1E2530; --primary: #FFFFFF; --primary-ink: #0E1116;
  --shadow-card: 0 1px 0 rgba(255,255,255,0.02), 0 12px 28px -16px rgba(0,0,0,0.6);
  --shadow-pop: 0 24px 48px -18px rgba(0,0,0,0.7);
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; min-height: 100vh;
  background:
    radial-gradient(1100px 620px at 12% -8%, color-mix(in srgb, var(--violet) 14%, transparent), transparent 60%),
    radial-gradient(900px 560px at 108% 112%, color-mix(in srgb, var(--pink) 12%, transparent), transparent 60%),
    var(--canvas);
  color: var(--ink);
  font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui, -apple-system, sans-serif;
  font-size: 14px; line-height: 1.45;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
.wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
.shell { width: 100%; max-width: 760px; }

/* Top brand + progress */
.ob-top { display: flex; align-items: center; gap: 11px; margin-bottom: 30px; }
.brand-mark {
  width: 34px; height: 34px; border-radius: 11px;
  background: linear-gradient(135deg, var(--violet) 0%, var(--pink) 100%);
  display: grid; place-items: center; color: white; font-weight: 800; font-size: 15px; letter-spacing: -0.02em;
  box-shadow: 0 6px 16px -5px rgba(109, 91, 255, 0.55);
}
.brand-name { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
.brand-name sup { font-size: 9px; font-weight: 600; color: var(--ink-3); margin-left: 2px; vertical-align: super; }
.ob-steps { margin-left: auto; display: flex; align-items: center; gap: 7px; }
.ob-steps i { width: 7px; height: 7px; border-radius: 50%; background: var(--line-strong); transition: all .25s; }
.ob-steps i.on { background: var(--violet); width: 22px; border-radius: 999px; }
.ob-steps i.done { background: var(--violet); }

/* Card */
.ob-card {
  background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-xl);
  box-shadow: var(--shadow-pop); padding: 38px 40px 30px; position: relative; overflow: hidden;
}
.ob-eyebrow { font-size: 11.5px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--violet); }
.ob-h { font-size: 27px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.12; margin: 11px 0 9px; text-wrap: balance; }
.ob-sub { font-size: 15px; color: var(--ink-3); line-height: 1.55; max-width: 52ch; text-wrap: pretty; }

/* Welcome hero */
.hero-spark {
  width: 60px; height: 60px; border-radius: 17px; display: grid; place-items: center; margin-bottom: 22px;
  background: linear-gradient(140deg, var(--violet), var(--indigo)); color: #fff;
  box-shadow: 0 14px 30px -12px var(--violet);
}
.hero-points { display: flex; flex-direction: column; gap: 13px; margin: 26px 0 4px; }
.hero-point { display: flex; align-items: flex-start; gap: 13px; }
.hp-ic { width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0; display: grid; place-items: center; }
.hp-ic.v { background: var(--violet-soft); color: var(--violet); }
.hp-ic.t { background: var(--teal-soft); color: var(--teal); }
.hp-ic.a { background: var(--amber-soft); color: var(--amber); }
.hp-tt b { display: block; font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
.hp-tt span { font-size: 13px; color: var(--ink-3); }

/* Option grid */
.opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 28px 0 6px; }
.opt-grid.exp { grid-template-columns: 1fr 1fr 1fr; }
.opt {
  text-align: left; appearance: none; cursor: pointer; font-family: inherit;
  background: var(--card); border: 1.5px solid var(--line); border-radius: var(--radius-lg);
  padding: 17px 17px 16px; transition: all .15s; position: relative;
}
.opt:hover { border-color: var(--line-strong); transform: translateY(-1px); }
.opt.sel { border-color: var(--violet); background: var(--violet-soft); box-shadow: 0 10px 26px -16px var(--violet); }
.opt-ic { width: 38px; height: 38px; border-radius: 11px; display: grid; place-items: center; background: var(--card-muted); color: var(--ink-2); margin-bottom: 13px; transition: all .15s; }
.opt.sel .opt-ic { background: var(--violet); color: #fff; }
.opt-name { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
.opt-desc { font-size: 12.5px; color: var(--ink-3); margin-top: 4px; line-height: 1.45; text-wrap: pretty; }
.opt .tick { position: absolute; top: 15px; right: 15px; width: 20px; height: 20px; border-radius: 50%; background: var(--violet); color: #fff; display: grid; place-items: center; opacity: 0; transform: scale(.6); transition: all .15s; }
.opt.sel .tick { opacity: 1; transform: scale(1); }
.exp .opt { padding-top: 16px; }
.exp .opt-ic { margin-bottom: 11px; }

/* Footer nav */
.ob-foot { display: flex; align-items: center; gap: 10px; margin-top: 30px; }
.btn-next {
  appearance: none; border: 0; cursor: pointer; font-family: inherit; margin-left: auto;
  background: var(--primary); color: var(--primary-ink); font-size: 14px; font-weight: 700;
  padding: 13px 22px; border-radius: 999px; display: inline-flex; align-items: center; gap: 8px; transition: filter .15s, opacity .15s;
}
.btn-next:hover { filter: brightness(1.08); }
.btn-next:disabled { opacity: .4; cursor: default; filter: none; }
.btn-back {
  appearance: none; border: 1px solid var(--line); background: var(--card); color: var(--ink-2); cursor: pointer; font-family: inherit;
  font-size: 13.5px; font-weight: 600; padding: 12px 18px; border-radius: 999px; display: inline-flex; align-items: center; gap: 7px;
}
.btn-back:hover { border-color: var(--line-strong); }
.btn-skip { appearance: none; border: 0; background: none; color: var(--ink-4); font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; padding: 12px 6px; }
.btn-skip:hover { color: var(--ink-2); }
.ob-note { text-align: center; font-size: 12px; color: var(--ink-4); margin-top: 18px; display: flex; align-items: center; justify-content: center; gap: 6px; }

.fade { animation: fade .3s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
@media (prefers-reduced-motion: reduce) { .fade { animation: none; } }

@media (max-width: 640px) {
  .ob-card { padding: 26px 22px 24px; }
  .opt-grid, .opt-grid.exp { grid-template-columns: 1fr; }
  .ob-h { font-size: 23px; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState } = React;

const Ico = ({ children, size = 22, sw = 1.8, ...p }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
       strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" {...p}>{children}</svg>
);
const Icons = {
  Sparkles: (p) => <Ico {...p}><path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6L12 3z" /><path d="M19 14l.8 2.2L22 17l-2.2.8L19 20l-.8-2.2L16 17l2.2-.8L19 14z" /></Ico>,
  Bell: (p) => <Ico {...p}><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" /><path d="M13.7 21a2 2 0 0 1-3.4 0" /></Ico>,
  Hand: (p) => <Ico {...p}><path d="M18 11V6a2 2 0 0 0-4 0M14 10V4a2 2 0 0 0-4 0v2M10 10.5V6a2 2 0 0 0-4 0v8" /><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2a8 8 0 0 1-7.7-6L3.2 13a2 2 0 0 1 3.6-1.7" /></Ico>,
  Target: (p) => <Ico {...p}><circle cx="12" cy="12" r="9" /><circle cx="12" cy="12" r="5" /><circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none" /></Ico>,
  Trend: (p) => <Ico {...p}><path d="M3 17l6-6 4 4 7-7" /><path d="M17 8h4v4" /></Ico>,
  Rocket: (p) => <Ico {...p}><path d="M5 16c-1.5 1.3-2 5-2 5s3.7-.5 5-2c.7-.8.7-2 0-2.8a2 2 0 0 0-3 0z" /><path d="M9 12a14 14 0 0 1 7-9c2.5 0 5 2.5 5 5a14 14 0 0 1-9 7" /><path d="M9 12l3 3" /><circle cx="15" cy="9" r="1.4" /></Ico>,
  Chart: (p) => <Ico {...p}><rect x="3" y="12" width="4" height="9" rx="1.4" /><rect x="10" y="7" width="4" height="14" rx="1.4" /><rect x="17" y="3" width="4" height="18" rx="1.4" /></Ico>,
  Seed: (p) => <Ico {...p}><path d="M12 22V12" /><path d="M12 12c0-4 3-7 8-7 0 4-3 7-8 7z" /><path d="M12 14C12 10 9 7 4 7c0 4 3 7 8 7z" /></Ico>,
  Compass: (p) => <Ico {...p}><circle cx="12" cy="12" r="9" /><path d="m15.5 8.5-2 5-5 2 2-5 5-2z" /></Ico>,
  Crown: (p) => <Ico {...p}><path d="M3 7l4 4 5-6 5 6 4-4-2 12H5L3 7z" /><path d="M5 19h14" /></Ico>,
  Check: (p) => <Ico {...p}><path d="M20 6 9 17l-5-5" /></Ico>,
  ArrowRight: (p) => <Ico {...p}><path d="M5 12h14M13 6l6 6-6 6" /></Ico>,
  ArrowLeft: (p) => <Ico {...p}><path d="M19 12H5M11 18l-6-6 6-6" /></Ico>,
  Lock: (p) => <Ico {...p}><rect x="4" y="11" width="16" height="10" rx="2" /><path d="M8 11V7a4 4 0 0 1 8 0v4" /></Ico>,
};

const ROLES = [
  { value: "performance_marketer", icon: "Target", name: "Performance marketer", desc: "Vivo de ROAS, CAC e mídia paga no detalhe." },
  { value: "growth",               icon: "Trend",  name: "Growth", desc: "Olho o funil inteiro: aquisição à retenção." },
  { value: "founder",              icon: "Rocket", name: "Fundador(a)", desc: "Quero o panorama e onde agir primeiro." },
  { value: "analyst",              icon: "Chart",  name: "Analista de dados", desc: "Gosto de causa, recorte e número fino." },
];
const LEVELS = [
  { value: "beginner",     icon: "Seed",    name: "Iniciante", desc: "Explique as siglas e o porquê." },
  { value: "intermediate", icon: "Compass", name: "Intermediário", desc: "Conheço o básico, vá direto ao ponto." },
  { value: "advanced",     icon: "Crown",   name: "Avançado", desc: "Pode falar técnico — sem rodeios." },
];

function Option({ o, selected, onClick }) {
  const Icon = Icons[o.icon];
  return (
    <button className={"opt" + (selected ? " sel" : "")} onClick={onClick}>
      <span className="tick"><Icons.Check size={12} sw={3} /></span>
      <span className="opt-ic"><Icon size={20} sw={1.9} /></span>
      <div className="opt-name">{o.name}</div>
      <div className="opt-desc">{o.desc}</div>
    </button>
  );
}

function App() {
  const [step, setStep] = useState(0);
  const [role, setRole] = useState(null);
  const [level, setLevel] = useState(null);

  const finish = () => {
    localStorage.setItem("ecp_persona", JSON.stringify({ role_type: role, experience_level: level }));
    localStorage.removeItem("ecp_tour_seen"); // garante o Tour na primeira Visão geral
    window.location.href = "visao-geral-v2.html";
  };

  return (
    <div className="wrap">
      <div className="shell">
        <div className="ob-top">
          <div className="brand-mark">eP</div>
          <div className="brand-name">EcommPilot<sup>v1</sup></div>
          <div className="ob-steps">
            {[0, 1, 2].map(s => <i key={s} className={s === step ? "on" : s < step ? "done" : ""} />)}
          </div>
        </div>

        {step === 0 && (
          <div className="ob-card fade">
            <div className="hero-spark"><Icons.Sparkles size={28} /></div>
            <div className="ob-eyebrow">Bem-vindo</div>
            <h1 className="ob-h">Seu copiloto de e-commerce, calibrado para você</h1>
            <p className="ob-sub">O ecommPilot conecta suas fontes de dados, vigia o que muda e te diz onde agir primeiro. Antes de começar, duas perguntas rápidas — assim o Conselheiro IA fala na sua língua.</p>
            <div className="hero-points">
              <div className="hero-point">
                <span className="hp-ic v"><Icons.Bell size={17} /></span>
                <span className="hp-tt"><b>Alertas que viram ação</b><span>Cada mudança vem com hipótese e primeira ação.</span></span>
              </div>
              <div className="hero-point">
                <span className="hp-ic t"><Icons.Sparkles size={17} /></span>
                <span className="hp-tt"><b>Conselheiro IA</b><span>Tire dúvidas sobre cada alerta, no seu nível.</span></span>
              </div>
              <div className="hero-point">
                <span className="hp-ic a"><Icons.Trend size={17} /></span>
                <span className="hp-tt"><b>7 vetores de crescimento</b><span>Mídia, social, SEO, email, GA4, retenção e atribuição.</span></span>
              </div>
            </div>
            <div className="ob-foot">
              <button className="btn-skip" onClick={finish}>Pular configuração</button>
              <button className="btn-next" onClick={() => setStep(1)}>Vamos lá <Icons.ArrowRight size={16} /></button>
            </div>
          </div>
        )}

        {step === 1 && (
          <div className="ob-card fade">
            <div className="ob-eyebrow">Passo 1 de 2</div>
            <h1 className="ob-h">Qual é o seu papel?</h1>
            <p className="ob-sub">Isso ajusta o foco da Visão geral e a profundidade das respostas do Conselheiro.</p>
            <div className="opt-grid">
              {ROLES.map(o => <Option key={o.value} o={o} selected={role === o.value} onClick={() => setRole(o.value)} />)}
            </div>
            <div className="ob-foot">
              <button className="btn-back" onClick={() => setStep(0)}><Icons.ArrowLeft size={15} /> Voltar</button>
              <button className="btn-next" disabled={!role} onClick={() => setStep(2)}>Continuar <Icons.ArrowRight size={16} /></button>
            </div>
          </div>
        )}

        {step === 2 && (
          <div className="ob-card fade">
            <div className="ob-eyebrow">Passo 2 de 2</div>
            <h1 className="ob-h">Quanto detalhe você quer?</h1>
            <p className="ob-sub">Define o tom do Conselheiro IA — de explicar cada sigla a ir direto ao ponto técnico.</p>
            <div className="opt-grid exp">
              {LEVELS.map(o => <Option key={o.value} o={o} selected={level === o.value} onClick={() => setLevel(o.value)} />)}
            </div>
            <div className="ob-foot">
              <button className="btn-back" onClick={() => setStep(1)}><Icons.ArrowLeft size={15} /> Voltar</button>
              <button className="btn-next" disabled={!level} onClick={finish}>Entrar no ecommPilot <Icons.ArrowRight size={16} /></button>
            </div>
            <div className="ob-note"><Icons.Lock size={12} /> Você pode mudar isso quando quiser no Admin.</div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
