<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>EcommPilot — History</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --canvas: #EEF0F4;
    --card: #FFFFFF;
    --card-muted: #F6F7F9;
    --line: #E7EAEF;
    --line-strong: #D5D9E0;

    --ink: #0E1116;
    --ink-2: #3A4150;
    --ink-3: #6B7280;
    --ink-4: #9AA1AC;
    --ink-5: #C4C9D1;

    --violet: #6D5BFF;
    --violet-soft: #EFEBFF;
    --indigo: #4458F5;
    --pink: #FF6B9B;
    --pink-soft: #FFE7EE;
    --teal: #14B8A6;
    --teal-soft: #DCFAF4;
    --amber: #F59E0B;
    --amber-soft: #FEF3C7;
    --rose: #F43F5E;
    --rose-soft: #FFE4E6;
    --sky: #38BDF8;
    --sky-soft: #E0F2FE;

    --radius-xl: 22px;
    --radius-lg: 18px;
    --radius: 14px;
    --radius-sm: 10px;
    --radius-xs: 8px;

    --shadow-card: 0 1px 0 rgba(15,17,22,0.02), 0 1px 3px rgba(15,17,22,0.04), 0 12px 28px -16px rgba(15,17,22,0.10);
    --shadow-pop: 0 24px 48px -18px rgba(15,17,22,0.18);
  }

  [data-theme="dark"] {
    --canvas: #0B0D11;
    --card: #14171D;
    --card-muted: #1A1E26;
    --line: #232831;
    --line-strong: #2E343F;
    --ink: #F1F3F7;
    --ink-2: #C7CDD7;
    --ink-3: #8B92A0;
    --ink-4: #5F6776;
    --ink-5: #3F4654;
    --violet: #8B7BFF;
    --violet-soft: #221C45;
    --pink: #FF7DA8;
    --pink-soft: #3D1B2C;
    --teal: #2DD4BF;
    --teal-soft: #103833;
    --amber: #FBBF24;
    --amber-soft: #3A2B0C;
    --rose: #FB7185;
    --rose-soft: #3A1820;
    --sky: #5DC9FB;
    --sky-soft: #0E2A3D;
    --shadow-card: 0 1px 0 rgba(255,255,255,0.02), 0 12px 28px -16px rgba(0,0,0,0.6);
    --shadow-pop: 0 24px 48px -18px rgba(0,0,0,0.7);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--canvas);
    color: var(--ink);
    font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "tnum"; }

  /* ── App shell ── */
  .app {
    display: grid;
    grid-template-columns: 232px 1fr;
    gap: 14px;
    padding: 14px;
    min-height: 100vh;
  }

  /* ── Sidebar (same as Dashboard) ── */
  .sidebar {
    background: var(--card);
    border-radius: var(--radius-xl);
    padding: 20px 14px;
    display: flex; flex-direction: column;
    gap: 2px;
    box-shadow: var(--shadow-card);
    position: sticky; top: 14px;
    height: calc(100vh - 28px);
  }
  .brand { display: flex; align-items: center; gap: 10px; padding: 4px 10px 22px; }
  .brand-mark {
    width: 32px; height: 32px; border-radius: 10px;
    background: linear-gradient(135deg, var(--violet) 0%, var(--pink) 100%);
    display: grid; place-items: center;
    color: white; font-weight: 700; font-size: 14px; letter-spacing: -0.02em;
    box-shadow: 0 4px 12px -4px rgba(109, 91, 255, 0.5);
  }
  .brand-name { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
  .brand-name sup { font-size: 9px; font-weight: 600; color: var(--ink-3); margin-left: 2px; vertical-align: super; }

  .store-switcher {
    margin: 0 0 14px; padding: 10px 12px;
    border: 1px solid var(--line);
    background: var(--card-muted);
    border-radius: var(--radius);
    cursor: pointer;
    display: flex; align-items: center; gap: 10px;
  }
  .store-avatar {
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, var(--teal), var(--sky));
    color: white; display: grid; place-items: center;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0;
  }
  .store-meta { flex: 1; min-width: 0; }
  .store-name { font-size: 13px; font-weight: 600; }
  .store-url { font-size: 11px; color: var(--ink-3); }
  .store-chevron { color: var(--ink-4); }

  .nav-section-label {
    font-size: 10.5px; font-weight: 600; color: var(--ink-4);
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 14px 10px 6px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 12px; border-radius: var(--radius-sm);
    color: var(--ink-2); cursor: pointer;
    font-size: 13px; font-weight: 500;
    transition: all .12s; user-select: none;
  }
  .nav-item:hover { background: var(--card-muted); color: var(--ink); }
  .nav-item.active {
    background: var(--ink); color: var(--card);
    font-weight: 600;
    box-shadow: 0 4px 10px -4px rgba(15,17,22,0.25);
  }
  [data-theme="dark"] .nav-item.active {
    background: var(--card-muted); color: var(--ink);
    box-shadow: inset 0 0 0 1px var(--line-strong);
  }
  .nav-item .icon { width: 16px; height: 16px; color: var(--ink-3); flex-shrink: 0; }
  .nav-item:hover .icon { color: var(--ink); }
  .nav-item.active .icon { color: var(--card); }
  [data-theme="dark"] .nav-item.active .icon { color: var(--violet); }
  .nav-item .badge {
    margin-left: auto; font-size: 10.5px; font-weight: 600;
    padding: 1px 6px; border-radius: 999px;
    background: var(--rose); color: white;
    line-height: 1.4; min-width: 18px; text-align: center;
  }
  .nav-item .badge.muted { background: var(--card-muted); color: var(--ink-3); }
  .nav-item.active .badge.muted { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.85); }
  .nav-spacer { flex: 1; }

  .nav-footer {
    padding: 12px 8px 4px; border-top: 1px solid var(--line);
    margin-top: 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .user-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, var(--amber), var(--rose));
    color: white; display: grid; place-items: center;
    font-size: 11px; font-weight: 700;
  }
  .user-name { font-size: 12.5px; font-weight: 600; }
  .user-role { font-size: 11px; color: var(--ink-3); }

  /* ── Main column ── */
  .main { min-width: 0; display: flex; flex-direction: column; gap: 14px; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: 4px 6px;
    flex-wrap: wrap;
  }
  .topbar h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.025em; margin: 0; }
  .topbar-sub {
    font-size: 13px; color: var(--ink-3); margin-top: 2px;
  }
  .topbar-actions { display: flex; align-items: center; gap: 8px; }
  .icon-btn {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--card); border: 1px solid var(--line);
    cursor: pointer; color: var(--ink-2);
    display: grid; place-items: center;
    box-shadow: var(--shadow-card);
    position: relative;
    transition: all .15s;
  }
  .icon-btn:hover { color: var(--ink); border-color: var(--line-strong); }
  .icon-btn .ping {
    position: absolute; top: 9px; right: 10px;
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--rose); border: 2px solid var(--card);
  }
  .btn-primary-pill {
    background: linear-gradient(135deg, var(--violet) 0%, var(--indigo) 100%);
    color: white; border: 0;
    padding: 10px 18px; border-radius: 999px;
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    box-shadow: 0 6px 16px -4px rgba(109, 91, 255, 0.45);
  }
  .btn-pill {
    background: var(--card); color: var(--ink);
    border: 1px solid var(--line);
    padding: 9px 16px; border-radius: 999px;
    font-family: inherit; font-size: 12.5px; font-weight: 600;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    box-shadow: var(--shadow-card);
  }
  .btn-pill:hover { border-color: var(--line-strong); }

  /* ── Stat strip ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .stat-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow-card);
    display: flex; align-items: center; gap: 12px;
  }
  .stat-glyph {
    width: 36px; height: 36px;
    border-radius: 11px;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .stat-glyph.crit  { background: var(--rose-soft);  color: var(--rose); }
  .stat-glyph.warn  { background: var(--amber-soft); color: var(--amber); }
  .stat-glyph.opp   { background: var(--teal-soft);  color: var(--teal); }
  .stat-glyph.info  { background: var(--sky-soft);   color: var(--sky); }
  .stat-num {
    font-size: 22px; font-weight: 700; letter-spacing: -0.025em;
    line-height: 1; margin-bottom: 3px;
  }
  .stat-lbl { font-size: 11.5px; color: var(--ink-3); font-weight: 500; }
  .stat-trend {
    font-size: 11px; color: var(--ink-3); font-weight: 500;
    margin-left: auto;
    display: flex; align-items: center; gap: 3px;
  }
  .stat-trend.up { color: var(--teal); }
  .stat-trend.down { color: var(--rose); }

  /* ── Toolbar (search + filters + tabs) ── */
  .toolbar-card {
    background: var(--card);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-card);
    padding: 14px 18px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .toolbar-row {
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap;
  }

  .search-input {
    flex: 1; min-width: 220px;
    display: flex; align-items: center; gap: 10px;
    background: var(--card-muted);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 8px 16px;
    transition: border-color .15s;
  }
  .search-input:focus-within { border-color: var(--violet); background: var(--card); }
  .search-input input {
    flex: 1; border: 0; outline: 0; background: transparent;
    font-family: inherit; font-size: 13px; color: var(--ink);
    min-width: 0;
  }
  .search-input input::placeholder { color: var(--ink-4); }
  .kbd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600;
    padding: 2px 6px; border-radius: 5px;
    background: var(--card); border: 1px solid var(--line);
    color: var(--ink-3);
  }

  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--card-muted);
    border: 1px solid var(--line);
    color: var(--ink-2);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    transition: all .12s;
  }
  .chip:hover { border-color: var(--line-strong); }
  .chip.active {
    background: var(--violet-soft);
    border-color: transparent;
    color: var(--violet);
  }
  .chip .x {
    color: var(--ink-4); margin-left: 2px;
  }
  .chip.active .x { color: var(--violet); }

  /* Status tabs */
  .status-tabs {
    display: flex; gap: 2px;
    border-bottom: 1px solid var(--line);
    margin: 0 -18px;
    padding: 0 18px;
  }
  .status-tab {
    appearance: none; border: 0; background: transparent;
    padding: 12px 0; margin-right: 24px;
    font-family: inherit; font-size: 13px; font-weight: 600;
    color: var(--ink-3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    display: inline-flex; align-items: center; gap: 8px;
    transition: color .12s;
  }
  .status-tab:hover { color: var(--ink-2); }
  .status-tab.active { color: var(--ink); border-bottom-color: var(--violet); }
  .status-tab .tab-pill {
    font-size: 10.5px; font-weight: 600;
    padding: 1px 7px; border-radius: 999px;
    background: var(--card-muted); color: var(--ink-3);
  }
  .status-tab.active .tab-pill { background: var(--violet); color: white; }

  /* ── Master / detail layout ── */
  .split {
    display: grid;
    grid-template-columns: minmax(360px, 1fr) minmax(420px, 1.2fr);
    gap: 14px;
    align-items: start;
  }

  .list-card {
    background: var(--card);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .list-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    gap: 8px;
  }
  .list-checkall {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: var(--ink-3);
    font-weight: 500;
  }
  .checkbox {
    appearance: none;
    width: 16px; height: 16px;
    border: 1.5px solid var(--ink-5);
    border-radius: 5px;
    background: var(--card);
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: all .12s;
  }
  .checkbox:checked, .checkbox.indeterminate {
    background: var(--violet); border-color: var(--violet);
  }
  .checkbox:checked::after {
    content: ""; position: absolute;
    left: 4px; top: 1px;
    width: 5px; height: 9px;
    border: solid white; border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .checkbox.indeterminate::after {
    content: ""; position: absolute;
    left: 3px; top: 6px;
    width: 8px; height: 2px;
    background: white;
  }

  .sort-select {
    appearance: none;
    background: var(--card-muted) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%236B7280' d='M0 0h10L5 6z'/></svg>") no-repeat right 10px center;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 5px 28px 5px 12px;
    font-family: inherit; font-size: 12px; font-weight: 500;
    color: var(--ink-2);
    cursor: pointer;
  }

  .list-rows {
    max-height: calc(100vh - 360px);
    min-height: 400px;
    overflow-y: auto;
  }

  .row {
    display: grid;
    grid-template-columns: auto auto 1fr auto;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background .12s;
    align-items: center;
    position: relative;
  }
  .row:last-child { border-bottom: 0; }
  .row:hover { background: var(--card-muted); }
  .row.selected {
    background: var(--violet-soft);
  }
  .row.selected::before {
    content: "";
    position: absolute;
    left: 0; top: 8px; bottom: 8px;
    width: 3px;
    background: var(--violet);
    border-radius: 0 3px 3px 0;
  }
  .row.read .row-headline { color: var(--ink-3); font-weight: 500; }
  .row.read .row-glyph { opacity: 0.55; }

  .row-glyph {
    width: 32px; height: 32px;
    border-radius: 10px;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .row[data-severity="critical"] .row-glyph { background: var(--rose-soft); color: var(--rose); }
  .row[data-severity="warning"]  .row-glyph { background: var(--amber-soft); color: var(--amber); }
  .row[data-severity="good"]     .row-glyph { background: var(--teal-soft); color: var(--teal); }
  .row[data-severity="info"]     .row-glyph { background: var(--sky-soft); color: var(--sky); }

  .row-body { min-width: 0; }
  .row-meta {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 3px;
    font-size: 11px;
    color: var(--ink-4);
  }
  .row-meta .src { color: var(--ink-3); font-weight: 500; }
  .row-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: currentColor; opacity: 0.5; }
  .row-meta .pill {
    background: var(--card-muted); color: var(--ink-3);
    padding: 1px 6px; border-radius: 999px;
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .row[data-severity="critical"] .row-meta .pill { background: var(--rose-soft); color: var(--rose); }
  .row[data-severity="warning"]  .row-meta .pill { background: var(--amber-soft); color: var(--amber); }
  .row[data-severity="good"]     .row-meta .pill { background: var(--teal-soft); color: var(--teal); }
  .row[data-severity="info"]     .row-meta .pill { background: var(--sky-soft); color: var(--sky); }

  .row-headline {
    font-size: 13.5px; font-weight: 600; letter-spacing: -0.01em;
    color: var(--ink); line-height: 1.35;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }

  .row-spark {
    width: 64px;
    align-self: center;
    flex-shrink: 0;
    color: var(--ink-3);
  }
  .row-time {
    font-size: 11px; color: var(--ink-4);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
    margin-top: 4px;
  }

  /* ── Detail pane (sticky on right) ── */
  .detail-card {
    background: var(--card);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-card);
    position: sticky;
    top: 14px;
    max-height: calc(100vh - 28px);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .detail-head {
    padding: 18px 22px;
    border-bottom: 1px solid var(--line);
    display: flex; flex-direction: column; gap: 8px;
    flex-shrink: 0;
  }
  .detail-head-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
  }
  .sev-tag {
    font-size: 10.5px; font-weight: 600;
    letter-spacing: 0.04em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .sev-tag.critical { background: var(--rose-soft);  color: var(--rose); }
  .sev-tag.warning  { background: var(--amber-soft); color: var(--amber); }
  .sev-tag.good     { background: var(--teal-soft);  color: var(--teal); }
  .sev-tag.info     { background: var(--sky-soft);   color: var(--sky); }
  .src-time { font-size: 12px; color: var(--ink-3); }
  .src-time .dot { color: var(--ink-4); margin: 0 4px; }

  .detail-actions { display: flex; gap: 6px; }
  .icon-btn-sm {
    appearance: none;
    width: 32px; height: 32px;
    border-radius: 9px;
    background: var(--card-muted);
    border: 1px solid var(--line);
    cursor: pointer; color: var(--ink-2);
    display: grid; place-items: center;
    transition: all .12s;
  }
  .icon-btn-sm:hover { background: var(--canvas); color: var(--ink); }
  .icon-btn-sm.active.up { background: var(--teal-soft); color: var(--teal); border-color: transparent; }
  .icon-btn-sm.active.down { background: var(--rose-soft); color: var(--rose); border-color: transparent; }

  .detail-body {
    flex: 1; overflow-y: auto;
    padding: 18px 22px 28px;
  }
  .detail-headline {
    font-size: 20px; font-weight: 700;
    letter-spacing: -0.02em; line-height: 1.3;
    margin: 4px 0 8px;
    text-wrap: pretty;
  }
  .detail-narrative {
    font-size: 13.5px; color: var(--ink-2); line-height: 1.55;
    margin: 0 0 18px; text-wrap: pretty;
  }
  .detail-narrative .num {
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
    color: var(--ink); background: var(--card-muted);
    padding: 0 5px; border-radius: 4px; font-size: 11.5px;
  }
  .detail-narrative .num.down { color: var(--rose); background: var(--rose-soft); }
  .detail-narrative .num.up { color: var(--teal); background: var(--teal-soft); }

  .detail-section { margin-bottom: 18px; }
  .detail-section h4 {
    font-size: 11px; font-weight: 700;
    color: var(--ink-3); letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 0 0 10px;
  }

  .panel-chart-card {
    background: var(--card-muted);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
  }
  .chart-stat-row { display: flex; gap: 24px; margin-bottom: 12px; }
  .chart-stat .label { font-size: 10.5px; color: var(--ink-3); margin-bottom: 3px; font-weight: 500; }
  .chart-stat .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px; font-weight: 600; letter-spacing: -0.01em;
  }
  .chart-stat .value.down { color: var(--rose); }

  .bulk-bar {

  .empty-detail {

  .panel-card {

  .heat {

  .heat-days {

    left: 33px; top: 0; bottom: 0;

  .event:last-child::before { bottom: 50%; }
  .event:first-child::before { top: 50%; }
  .event-only::before { display: none; }

  .event-dot {

  .event-meta .dot-sep { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-4); }

  .outcome-pill {

    font-size: 10.5px; font-weight: 600;

  .outcome-pill.resolved { background: var(--teal-soft); color: var(--teal); }
  .outcome-pill.ignored { background: var(--card-muted); color: var(--ink-3); }

  .event-headline {
    font-size: 13.5px; font-weight: 600; letter-spacing: -0.01em;

  .event-detail {

  .insight-card {

  .breakdown { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }

  .empty-history {

    margin: 0 auto 16px;

  }
