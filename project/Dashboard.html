<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>EcommPilot — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Cool, neutral canvas — not warm cream */
    --canvas: #EEF0F4;
    --card: #FFFFFF;
    --card-muted: #F6F7F9;
    --line: #E7EAEF;
    --line-strong: #D5D9E0;

    --ink: #0E1116;
    --ink-2: #3A4150;
    --ink-3: #6B7280;
    --ink-4: #9AA1AC;
    --ink-5: #C4C9D1;

    /* Vibrant accents — multi-color like the refs */
    --violet: #6D5BFF;
    --violet-soft: #EFEBFF;
    --indigo: #4458F5;
    --pink: #FF6B9B;
    --pink-soft: #FFE7EE;
    --teal: #14B8A6;
    --teal-soft: #DCFAF4;
    --amber: #F59E0B;
    --amber-soft: #FEF3C7;
    --rose: #F43F5E;
    --rose-soft: #FFE4E6;
    --sky: #38BDF8;
    --sky-soft: #E0F2FE;
    --lime: #84CC16;
    --lime-soft: #ECFCCB;

    /* primary action color */
    --primary: #0E1116;
    --primary-ink: #FFFFFF;

    --radius-xl: 22px;
    --radius-lg: 18px;
    --radius: 14px;
    --radius-sm: 10px;
    --radius-xs: 8px;

    --shadow-card: 0 1px 0 rgba(15,17,22,0.02), 0 1px 3px rgba(15,17,22,0.04), 0 12px 28px -16px rgba(15,17,22,0.10);
    --shadow-pop: 0 1px 0 rgba(15,17,22,0.02), 0 24px 48px -18px rgba(15,17,22,0.18);

    --pad: 20px;
    --gap: 14px;
  }

  [data-density="compact"] { --pad: 14px; --gap: 10px; }
  [data-density="comfy"]   { --pad: 26px; --gap: 18px; }

  [data-theme="dark"] {
    --canvas: #0B0D11;
    --card: #14171D;
    --card-muted: #1A1E26;
    --line: #232831;
    --line-strong: #2E343F;

    --ink: #F1F3F7;
    --ink-2: #C7CDD7;
    --ink-3: #8B92A0;
    --ink-4: #5F6776;
    --ink-5: #3F4654;

    --violet: #8B7BFF;
    --violet-soft: #221C45;
    --pink: #FF7DA8;
    --pink-soft: #3D1B2C;
    --teal: #2DD4BF;
    --teal-soft: #103833;
    --amber: #FBBF24;
    --amber-soft: #3A2B0C;
    --rose: #FB7185;
    --rose-soft: #3A1820;
    --sky: #5DC9FB;
    --sky-soft: #0E2A3D;
    --lime: #A3E635;
    --lime-soft: #1F2E0E;

    --primary: #FFFFFF;
    --primary-ink: #0E1116;

    --shadow-card: 0 1px 0 rgba(255,255,255,0.02), 0 12px 28px -16px rgba(0,0,0,0.6);
    --shadow-pop: 0 24px 48px -18px rgba(0,0,0,0.7);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--canvas);
    color: var(--ink);
    font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui, -apple-system, sans-serif;
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "tnum"; letter-spacing: -0.01em; }

  /* ── App shell — card on canvas ───────────────────────── */
  .app {
    display: grid;
    grid-template-columns: 232px 1fr;
    gap: 14px;
    padding: 14px;
    min-height: 100vh;
  }

  /* ── Sidebar (rounded card) ───────────────────────────── */
  .sidebar {
    background: var(--card);
    border-radius: var(--radius-xl);
    padding: 20px 14px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    box-shadow: var(--shadow-card);
    position: sticky;
    top: 14px;
    height: calc(100vh - 28px);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 10px 22px;
  }
  .brand-mark {
    width: 32px; height: 32px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--violet) 0%, var(--pink) 100%);
    display: grid; place-items: center;
    color: white;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: -0.02em;
    box-shadow: 0 4px 12px -4px rgba(109, 91, 255, 0.5);
  }
  .brand-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .brand-name sup {
    font-size: 9px;
    font-weight: 600;
    color: var(--ink-3);
    margin-left: 2px;
    vertical-align: super;
  }

  .store-switcher {
    margin: 0 0 14px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    background: var(--card-muted);
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all .15s;
  }
  .store-switcher:hover { border-color: var(--line-strong); }
  .store-avatar {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--teal), var(--sky));
    flex-shrink: 0;
    color: white;
    display: grid; place-items: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .store-meta { flex: 1; min-width: 0; }
  .store-name {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .store-url {
    font-size: 11px;
    color: var(--ink-3);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .store-chevron { color: var(--ink-4); flex-shrink: 0; }

  .nav-section-label {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--ink-4);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 14px 10px 6px;
  }

  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    color: var(--ink-2);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all .12s;
    user-select: none;
    position: relative;
  }
  .nav-item:hover { background: var(--card-muted); color: var(--ink); }
  .nav-item.active {
    background: var(--ink);
    color: var(--card);
    font-weight: 600;
    box-shadow: 0 4px 10px -4px rgba(15,17,22,0.25);
  }
  [data-theme="dark"] .nav-item.active {
    background: var(--card-muted);
    color: var(--ink);
    box-shadow: inset 0 0 0 1px var(--line-strong);
  }
  .nav-item .icon {
    width: 16px; height: 16px;
    color: var(--ink-3);
    flex-shrink: 0;
  }
  .nav-item:hover .icon { color: var(--ink); }
  .nav-item.active .icon { color: var(--card); }
  [data-theme="dark"] .nav-item.active .icon { color: var(--violet); }
  .nav-item .badge {
    margin-left: auto;
    font-size: 10.5px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 999px;
    background: var(--rose);
    color: white;
    line-height: 1.4;
    min-width: 18px;
    text-align: center;
  }
  .nav-item.active .badge { background: var(--rose); color: white; }
  .nav-item .badge.muted {
    background: var(--card-muted);
    color: var(--ink-3);
  }
  .nav-item.active .badge.muted {
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.85);
  }

  .nav-spacer { flex: 1; }

  .upgrade-card {
    margin: 14px 2px 4px;
    padding: 16px;
    background: linear-gradient(160deg, #1B1F2A 0%, #0E1116 100%);
    border-radius: var(--radius);
    color: white;
    position: relative;
    overflow: hidden;
  }
  .upgrade-card::before {
    content: "";
    position: absolute;
    top: -30px; right: -30px;
    width: 90px; height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(109,91,255,0.6), transparent 70%);
  }
  [data-theme="dark"] .upgrade-card {
    background: linear-gradient(160deg, var(--violet-soft) 0%, var(--card-muted) 100%);
    border: 1px solid var(--line);
  }
  .upgrade-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: linear-gradient(135deg, var(--violet), var(--pink));
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }
  [data-theme="dark"] .upgrade-pill { color: white; }
  .upgrade-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
    position: relative; z-index: 1;
  }
  [data-theme="dark"] .upgrade-title { color: var(--ink); }
  .upgrade-sub {
    font-size: 11.5px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 12px;
    line-height: 1.4;
    position: relative; z-index: 1;
  }
  [data-theme="dark"] .upgrade-sub { color: var(--ink-3); }
  .upgrade-btn {
    appearance: none; border: 0;
    background: white;
    color: #0E1116;
    padding: 8px 14px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    position: relative; z-index: 1;
  }
  [data-theme="dark"] .upgrade-btn { background: var(--ink); color: var(--card); }

  .nav-footer {
    padding: 12px 8px 4px;
    border-top: 1px solid var(--line);
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .user-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--amber), var(--rose));
    color: white;
    display: grid; place-items: center;
    font-size: 11px;
    font-weight: 700;
  }
  .user-name { font-size: 12.5px; font-weight: 600; color: var(--ink); }
  .user-role { font-size: 11px; color: var(--ink-3); }

  /* ── Main column ──────────────────────────────────────── */
  .main {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: var(--gap);
  }

  /* ── Topbar — pill controls floating on canvas ───────── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 4px 6px;
    flex-wrap: wrap;
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .topbar h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.025em;
    margin: 0;
  }
  .seg-pill {
    display: inline-flex;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px;
    box-shadow: var(--shadow-card);
  }
  .seg-pill button {
    appearance: none; border: 0;
    background: transparent;
    color: var(--ink-3);
    padding: 6px 14px;
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 500;
    border-radius: 999px;
    cursor: pointer;
    transition: all .15s;
  }
  .seg-pill button:hover { color: var(--ink); }
  .seg-pill button.active {
    background: var(--ink);
    color: var(--card);
  }
  [data-theme="dark"] .seg-pill button.active {
    background: var(--violet);
    color: white;
  }

  .topbar-actions { display: flex; align-items: center; gap: 8px; }

  .icon-btn {
    appearance: none;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--card);
    border: 1px solid var(--line);
    cursor: pointer;
    color: var(--ink-2);
    display: grid; place-items: center;
    transition: all .15s;
    position: relative;
    box-shadow: var(--shadow-card);
  }
  .icon-btn:hover { color: var(--ink); border-color: var(--line-strong); }
  .icon-btn .ping {
    position: absolute;
    top: 9px; right: 10px;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--rose);
    border: 2px solid var(--card);
  }

  .btn-primary-pill {
    appearance: none;
    background: linear-gradient(135deg, var(--violet) 0%, var(--indigo) 100%);
    color: white;
    border: 0;
    padding: 10px 18px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 6px 16px -4px rgba(109, 91, 255, 0.45);
    transition: transform .12s;
  }
  .btn-primary-pill:hover { transform: translateY(-1px); }

  /* ── Greeting card ────────────────────────────────────── */
  .greeting-card {
    background: var(--card);
    border-radius: var(--radius-xl);
    padding: 24px 28px;
    box-shadow: var(--shadow-card);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .greeting-card::before {
    content: "";
    position: absolute;
    top: -100px; right: -50px;
    width: 280px; height: 280px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--violet-soft) 0%, transparent 65%);
    opacity: 0.7;
    pointer-events: none;
  }
  .greeting-eyebrow {
    font-size: 11px;
    font-weight: 600;
    color: var(--violet);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
    background: var(--violet-soft);
    padding: 4px 10px;
    border-radius: 999px;
  }
  .greeting-card h2 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 0 0 6px;
    line-height: 1.3;
    max-width: 640px;
    text-wrap: pretty;
  }
  .greeting-card h2 .em { color: var(--violet); font-weight: 700; }
  .greeting-card h2 .em.green { color: var(--teal); }
  .greeting-sub {
    color: var(--ink-3);
    font-size: 13.5px;
    max-width: 580px;
    text-wrap: pretty;
    position: relative; z-index: 1;
  }
  .greeting-summary {
    display: flex;
    gap: 20px;
    position: relative; z-index: 1;
  }
  .greeting-stat {
    text-align: right;
  }
  .greeting-stat .num {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 4px;
  }
  .greeting-stat .num.crit { color: var(--rose); }
  .greeting-stat .num.opp { color: var(--teal); }
  .greeting-stat .lbl {
    font-size: 11px;
    color: var(--ink-3);
    font-weight: 500;
  }

  /* ── Metric cards row ─────────────────────────────────── */
  .metrics {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: var(--gap);
  }
  .metric-card {
    background: var(--card);
    border-radius: var(--radius-lg);
    padding: 18px 18px 16px;
    box-shadow: var(--shadow-card);
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    position: relative;
    overflow: hidden;
  }
  .metric-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-pop); }

  .metric-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .metric-icon {
    width: 26px; height: 26px;
    border-radius: 8px;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .metric-icon.violet { background: var(--violet-soft); color: var(--violet); }
  .metric-icon.teal   { background: var(--teal-soft);   color: var(--teal); }
  .metric-icon.amber  { background: var(--amber-soft);  color: var(--amber); }
  .metric-icon.pink   { background: var(--pink-soft);   color: var(--pink); }
  .metric-icon.sky    { background: var(--sky-soft);    color: var(--sky); }
  [data-theme="dark"] .metric-icon.amber { color: var(--amber); }

  .metric-label {
    font-size: 12px;
    color: var(--ink-3);
    font-weight: 500;
  }
  .metric-value {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.025em;
    color: var(--ink);
    line-height: 1.05;
    margin-bottom: 8px;
  }
  .metric-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .metric-delta {
    font-size: 11.5px;
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 999px;
  }
  .metric-delta.up { color: var(--teal); background: var(--teal-soft); }
  .metric-delta.down { color: var(--rose); background: var(--rose-soft); }
  .metric-spark.hidden { display: none; }

  /* ── Feed area ────────────────────────────────────────── */
  .feed-card {
    background: var(--card);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .feed-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 20px 24px 16px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--line);
  }
  .feed-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.015em;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .feed-title .count {
    font-size: 12px;
    color: var(--ink-3);
    font-weight: 500;
  }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-btn {
    appearance: none; border: 0;
    background: var(--card-muted);
    color: var(--ink-3);
    padding: 6px 12px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    border-radius: 999px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all .15s;
  }
  .filter-btn:hover { color: var(--ink); }
  .filter-btn.active {
    background: var(--ink);
    color: var(--card);
  }
  [data-theme="dark"] .filter-btn.active {
    background: var(--violet);
    color: white;
  }
  .filter-btn .pill {
    font-size: 10.5px;
    color: var(--ink-4);
    font-weight: 500;
    background: var(--card);
    padding: 1px 6px;
    border-radius: 999px;
  }
  .filter-btn.active .pill {
    background: rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.9);
  }
  [data-theme="dark"] .filter-btn .pill { background: var(--canvas); }

  .feed-list {
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  [data-layout="grid"] .feed-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    padding: 14px;
    gap: 12px;
  }

  /* ── Alert cards ──────────────────────────────────────── */
  .alert {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: all .15s;
    position: relative;
    display: grid;
    grid-template-columns: 36px 1fr auto;
    gap: 16px;
    align-items: start;
  }
  [data-layout="grid"] .alert { grid-template-columns: 36px 1fr; }
  .alert:hover {
    border-color: var(--line-strong);
    box-shadow: 0 8px 20px -10px rgba(15,17,22,0.10);
  }
  .alert.resolved { opacity: 0.55; }

  .alert-glyph {
    width: 36px; height: 36px;
    border-radius: 12px;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .alert[data-severity="critical"] .alert-glyph { background: var(--rose-soft); color: var(--rose); }
  .alert[data-severity="warning"]  .alert-glyph { background: var(--amber-soft); color: var(--amber); }
  .alert[data-severity="good"]     .alert-glyph { background: var(--teal-soft); color: var(--teal); }
  .alert[data-severity="info"]     .alert-glyph { background: var(--sky-soft); color: var(--sky); }

  .alert-body { min-width: 0; }
  .alert-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .sev-tag {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .alert[data-severity="critical"] .sev-tag { background: var(--rose-soft); color: var(--rose); }
  .alert[data-severity="warning"]  .sev-tag { background: var(--amber-soft); color: var(--amber); }
  .alert[data-severity="good"]     .sev-tag { background: var(--teal-soft); color: var(--teal); }
  .alert[data-severity="info"]     .sev-tag { background: var(--sky-soft); color: var(--sky); }

  .alert-source { font-size: 11.5px; color: var(--ink-3); }
  .alert-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-4); }
  .alert-time { font-size: 11.5px; color: var(--ink-4); }

  .alert-headline {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.015em;
    line-height: 1.35;
    color: var(--ink);
    margin: 2px 0 6px;
  }
  .alert-narrative {
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.5;
    margin: 0 0 12px;
    text-wrap: pretty;
  }
  .alert-narrative .num {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    color: var(--ink);
    background: var(--card-muted);
    padding: 0 5px;
    border-radius: 4px;
    font-size: 11.5px;
  }
  .alert-narrative .num.down { color: var(--rose); background: var(--rose-soft); }
  .alert-narrative .num.up   { color: var(--teal); background: var(--teal-soft); }

  .alert-cta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .alert-cta {
    appearance: none;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    padding: 6px 12px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    border-radius: 999px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all .12s;
  }
  .alert-cta:hover { border-color: var(--line-strong); background: var(--card-muted); }
  .alert-cta.primary {
    background: var(--ink);
    color: var(--card);
    border-color: var(--ink);
  }
  [data-theme="dark"] .alert-cta.primary {
    background: var(--violet);
    color: white;
    border-color: var(--violet);
  }

  .alert-chart {
    width: 200px;
    flex-shrink: 0;
    align-self: stretch;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  [data-layout="grid"] .alert-chart {
    width: 100%;
    margin-top: 4px;
    grid-column: 1 / -1;
  }
  .alert-chart.hidden { display: none; }
  .chart-label-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .chart-metric {
    font-size: 10.5px;
    font-weight: 500;
    color: var(--ink-3);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .chart-current {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
  }

  /* ── Slide-over detail ─────────────────────────────────── */
  .scrim {
    position: fixed; inset: 0;
    background: rgba(15, 17, 22, 0.32);
    backdrop-filter: blur(2px);
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity .22s;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }

  .panel {
    position: fixed;
    top: 14px; right: 14px;
    height: calc(100vh - 28px);
    width: min(560px, calc(100vw - 28px));
    background: var(--card);
    border-radius: var(--radius-xl);
    z-index: 51;
    transform: translateX(calc(100% + 20px));
    transition: transform .28s cubic-bezier(.4,.0,.2,1);
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-pop);
    overflow: hidden;
  }
  .panel.open { transform: translateX(0); }
  .panel-header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-shrink: 0;
  }
  .panel-close {
    appearance: none;
    border: 1px solid var(--line);
    background: var(--card-muted);
    width: 32px; height: 32px;
    border-radius: 10px;
    cursor: pointer;
    color: var(--ink-2);
    display: grid; place-items: center;
  }
  .panel-close:hover { background: var(--canvas); }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 22px 22px 32px;
  }

  .panel-headline {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.3;
    margin: 6px 0 8px;
    text-wrap: pretty;
  }
  .panel-narrative {
    font-size: 14px;
    color: var(--ink-2);
    line-height: 1.55;
    margin: 0 0 22px;
    text-wrap: pretty;
  }
  .panel-section { margin-bottom: 22px; }
  .panel-section h4 {
    font-size: 11px;
    font-weight: 700;
    color: var(--ink-3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 0 0 10px;
  }

  .panel-chart-card {
    background: var(--card-muted);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
  }
  .chart-stat-row {
    display: flex;
    gap: 24px;
    margin-bottom: 14px;
  }
  .chart-stat .label {
    font-size: 11px;
    color: var(--ink-3);
    margin-bottom: 3px;
    font-weight: 500;
  }
  .chart-stat .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .chart-stat .value.down { color: var(--rose); }
  .chart-stat .value.up { color: var(--teal); }

  .cause-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
  .cause {
    background: var(--card-muted);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
  }
  .cause-conf {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--violet);
    background: var(--violet-soft);
    padding: 3px 8px;
    border-radius: 999px;
    flex-shrink: 0;
  }
  .cause-text { font-size: 13px; color: var(--ink-2); line-height: 1.45; }
  .cause-icon { color: var(--ink-4); }

  .actions-list { display: flex; flex-direction: column; gap: 8px; }
  .action {
    background: var(--card-muted);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .action-num {
    width: 24px; height: 24px;
    border-radius: 8px;
    background: var(--violet);
    color: white;
    font-size: 11px;
    font-weight: 700;
    display: grid; place-items: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .action-body { flex: 1; min-width: 0; }
  .action-title { font-size: 13.5px; font-weight: 600; margin-bottom: 3px; color: var(--ink); }
  .action-desc { font-size: 12.5px; color: var(--ink-3); line-height: 1.45; }
  .action-cta {
    appearance: none;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    padding: 5px 10px;
    font-size: 11.5px;
    font-weight: 600;
    border-radius: 999px;
    cursor: pointer;
    flex-shrink: 0;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .action-cta:hover { border-color: var(--line-strong); background: var(--card-muted); }

  .feedback-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-top: 1px solid var(--line);
    margin-top: 10px;
  }
  .feedback-q { font-size: 12.5px; color: var(--ink-3); }
  .feedback-btns { display: flex; gap: 6px; }
  .fb-btn {
    appearance: none;
    border: 1px solid var(--line);
    background: var(--card);
    width: 32px; height: 32px;
    border-radius: 10px;
    cursor: pointer;
    color: var(--ink-3);
    display: grid; place-items: center;
    transition: all .12s;
  }
  .fb-btn:hover { color: var(--ink); border-color: var(--line-strong); }
  .fb-btn.active.up { color: var(--teal); background: var(--teal-soft); border-color: transparent; }
  .fb-btn.active.down { color: var(--rose); background: var(--rose-soft); border-color: transparent; }

  .panel-footer-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-3);
  }
  .empty .em-mark {
    width: 44px; height: 44px;
    margin: 0 auto 12px;
    border-radius: 14px;
    background: var(--teal-soft);
    color: var(--teal);
    display: grid; place-items: center;
  }
  .empty-title { font-size: 15px; color: var(--ink); font-weight: 600; margin-bottom: 4px; }
  .empty-sub { font-size: 13px; }

  /* Live dot */
  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.5);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.5); }
    50% { box-shadow: 0 0 0 6px rgba(20, 184, 166, 0); }
  }
  .live-text {
    font-size: 12px;
    color: var(--ink-3);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--line);
    box-shadow: var(--shadow-card);
  }

  @media (max-width: 1100px) {
    .metrics { grid-template-columns: repeat(3, 1fr); }
    .greeting-card { grid-template-columns: 1fr; }
    .greeting-summary { justify-content: flex-start; }
    .greeting-stat { text-align: left; }
  }
  @media (max-width: 760px) {
    .app { grid-template-columns: 1fr; padding: 10px; }
    .metrics { grid-template-columns: repeat(2, 1fr); }
  }
</style></head>
